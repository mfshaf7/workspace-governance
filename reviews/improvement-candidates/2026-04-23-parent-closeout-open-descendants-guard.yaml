schema_version: 1
id: 2026-04-23-parent-closeout-open-descendants-guard
title: Fail closed when ART parents are closed over open descendants
recorded_on: '2026-04-23'
owner_repo: workspace-governance
summary: A parent ART item was closed while child work remained open because the broker
  completion path did not validate descendants and the broker execution summary skipped
  later work packages after the first OpenProject page.
regression_of: null
status: closed
source_type: conversation
scope:
  related_repos:
  - operator-orchestration-service
  - platform-engineering
  related_products:
  - openproject
  related_components:
  - operator-orchestration-service
  change_classes:
  - architecture-shaping
  - source-behavior
signals:
- id: operator-repeated-mistake-callout
  title: The operator explicitly said the miss is a repeated mistake and expects the
    system to learn from it.
  trigger: repeated-operator-friction
  failure_classes:
  - unsafe-assumption
  - workflow-doctrine-gap
  finding: 'Enabler #181 was marked done even though child tasks #182-185 were still
    open. Two control gaps made that possible: the broker completion workflow did
    not fail closed on open descendants, and the broker execution summary paginated
    OpenProject work packages incorrectly and stopped after page 1, hiding later descendants
    such as #175 and #181 from the read model.'
  source_refs:
  - 'conversation: operator called out that #181 still had multiple child tasks open
    after completion'
resolution:
  after_action_ref: null
  control_refs:
  - type: workflow
    path: operator-orchestration-service/src/openproject-client.js
    owner_repo: operator-orchestration-service
    note: Completion now rejects parent work-item closeout while descendants remain outside done or retired.
  - type: test
    path: operator-orchestration-service/test/openproject-client.test.js
    owner_repo: operator-orchestration-service
    note: Covers `completion_open_descendants` rejection for parent completion with open descendants.
  - type: validator
    path: platform-engineering/products/openproject/scripts/openproject_check_delivery_art_quality.py
    owner_repo: platform-engineering
    note: ART quality now flags done work items and initiatives that still hide open descendants.
  - type: doc
    path: operator-orchestration-service/docs/contracts/delivery-workflow-api-v1.md
    owner_repo: operator-orchestration-service
    note: Documents parent completion fail-closed behavior for descendants outside done or retired.
  note: Closed after broker completion, tests, ART quality checks, and API contract
    docs all enforce parent-closeout descendant honesty.
