summary: 'During #420/#426 activation, plan/apply correctly committed ART work to
  PI-2026-03 but OpenProject version projection needed the platform sync step before
  quality passed. The operator clarified that version projection reconciliation is
  not a surprise gap and must be treated as a normal required workflow step for any
  mutation that can leave derived roadmap version projection stale.'
