summary: >-
  Codex again edited structured delivery records without immediate parse/schema
  preflight. First, a change record failed the repo's required heading format
  and was corrected only after validation. Later, an improvement candidate YAML
  edit introduced an invalid scalar containing `#369`; that was also caught only
  when the full candidate validator ran. The same change-record heading miss
  repeated during ART #378/#392 closeout-quality repair when an OOS change
  record omitted `Artifact And Deployment Evidence`.
