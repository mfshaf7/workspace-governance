signals:
  - id: repeated-art-assignee-discovery-miss
    title: Assignee selection kept drifting away from the live assignables list
    trigger: repeated-manual-retrospective
    failure_classes:
      - workflow-doctrine-gap
    finding: The operator explicitly called out that the correct step was to
      just check the assignee list, but the ART workflow still allowed ad hoc
      rediscovery instead of one fixed preflight before setting `assignee_login`
      or `responsible_login`.
    source_refs:
    - 'conversation: operator said "wth? just check the assignee list" and later "no you keep forgetting about assignee requirement and how to find it"'
resolution:
  after_action_ref: null
  control_refs:
  - type: script
    path: operator-orchestration-service/scripts/show_delivery_art_assignables.mjs
    owner_repo: operator-orchestration-service
    note: Provides one fixed live command for Workspace Delivery ART assignable-principal discovery.
  - type: doc
    path: operator-orchestration-service/docs/operations/delivery-workflow-operator-surface.md
    owner_repo: operator-orchestration-service
    note: Makes the assignable-principal lookup an explicit ART preflight before assignee or responsible writes.
  - type: skill
    path: workspace-governance/skills-src/project-delivery-operator/SKILL.md
    owner_repo: workspace-governance
    note: Teaches future sessions to read the live assignable-principal list before setting ART assignee or responsible.
  note: Closed by adding one explicit live assignables preflight and routing the
    ART skill through it before assignee or responsible writes.
