schema_version: 1
id: 2026-04-24-art-assignable-principal-discovery-gap
title: ART assignee and responsible selection relied on ad hoc discovery instead of one fixed assignables preflight
recorded_on: '2026-04-24'
owner_repo: workspace-governance
summary: The assignable-principal rule existed in the delivery contract, but
  the operator-first ART workflow did not expose one fixed discovery step. That
  left assignee and responsible selection vulnerable to ad hoc rediscovery and
  repeated operator friction.
regression_of: null
status: closed
source_type: conversation
scope:
  related_repos:
  - operator-orchestration-service
  - workspace-governance
  related_products: []
  related_components:
