schema_version: 1
id: 2026-04-24-api-response-contract-gap-in-doc-front
title: Strengthen API response contracts before treating the Redoc front as complete
recorded_on: '2026-04-24'
owner_repo: workspace-governance
summary: The first Redoc API front looked complete because request shapes and route
  coverage were documented, but many write routes still hid behind GenericObjectResponse
  and had no explicit response examples, leaving the response side weak and the rendered
  front visibly incomplete.
regression_of: null
status: closed
source_type: conversation
scope:
  related_repos:
  - operator-orchestration-service
  - workspace-governance
  related_products: []
  related_components: []
  change_classes:
  - architecture-shaping
  - source-behavior
signals:
- id: operator-half-baked-callout
  title: The operator explicitly said the work is half-baked, incomplete, sloppy,
    or should have been caught already.
  trigger: repeated-operator-friction
  failure_classes:
  - workflow-doctrine-gap
  finding: The operator called out the API front as bad because endpoint intent and
    examples were blurry, and a later check showed blank response samples because
    the response contract was still generic. The slice was closed too early on route
    coverage and request examples without response-contract adequacy.
  source_refs:
  - 'conversation: operator said the API front was bad and response samples were blank'
resolution:
  after_action_ref: null
  control_refs:
  - type: doc
    path: operator-orchestration-service/docs/api/openapi.json
    owner_repo: operator-orchestration-service
    note: Strengthens broker response contracts and response examples so the API front
      documents what the service actually returns.
  - type: validator
    path: operator-orchestration-service/scripts/validate_api_docs.mjs
    owner_repo: operator-orchestration-service
    note: Fails when broker routes lack response examples and when write routes fall
      back to GenericObjectResponse.
  - type: script
    path: operator-orchestration-service/scripts/show_api_contract.mjs
    owner_repo: operator-orchestration-service
    note: Provides a fast route-contract lookup so future broker work starts from
      the documented API contract instead of source tracing.
  - type: script
    path: operator-orchestration-service/scripts/probe_api_contract.mjs
    owner_repo: operator-orchestration-service
    note: Adds a live broker probe that validates the active response body against
      the documented contract from the approved k3s path.
  - type: test
    path: operator-orchestration-service/test/api-contract.test.js
    owner_repo: operator-orchestration-service
    note: Checks documented examples and representative broker responses against
      the documented schemas.
  - type: doc
    path: operator-orchestration-service/AGENTS.md
    owner_repo: operator-orchestration-service
    note: Makes the OpenAPI front and lookup command the default first read for existing
      broker routes.
  - type: skill
    path: workspace-governance/skills-src/project-delivery-operator/SKILL.md
    owner_repo: workspace-governance
    note: Teaches future ART sessions to use the documented broker contract before
      tracing broker handlers for existing routes.
  note: The API front now requires response examples and machine-readable route
    metadata, broker write routes can no longer use GenericObjectResponse, a fast
    route-contract lookup and live probe exist, representative contract checks
    run in test, and the active delivery skill now tells future sessions to start
    broker route work from the documented contract and probe before source tracing.
