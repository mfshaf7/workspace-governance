schema_version: 1
id: 2026-04-25-art-planning-repair-execution-context-sync-gap
title: Planning repair leaves ART execution-context narrative drift that closeout
  later rejects
recorded_on: '2026-04-25'
owner_repo: workspace-governance
summary: The governed planning-repair path can update machine fields like Delivery
  Team without synchronizing the Execution Context bullets in the work-item description.
  Closeout then correctly fails on done-state narrative drift, which means the earlier
  workflow left the item in a half-repaired state.
regression_of: null
status: closed
source_type: conversation
