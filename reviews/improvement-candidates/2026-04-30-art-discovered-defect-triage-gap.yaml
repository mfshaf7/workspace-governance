schema_version: 1
id: 2026-04-30-art-discovered-defect-triage-gap
title: Require discovered ART defects to be triaged before interrupting active work
recorded_on: '2026-04-30'
owner_repo: workspace-governance
summary: 'During #420 execution, a plan.apply projection-signal defect was discovered
  after activating #439/#440. Projection drift was contained and quality passed, but
  the session almost context-switched into fixing the new defect immediately instead
  of classifying it as blocker, deferred defect, or absorbed same-slice work. The
  workflow needs a durable triage gate so discovered defects do not hijack active
  ART execution after containment.'
