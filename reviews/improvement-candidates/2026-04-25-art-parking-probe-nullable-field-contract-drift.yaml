signals:
- id: repeated-corrective-follow-up
  title: The same workflow needed another corrective follow-up in the same task or
    session.
  trigger: machine-visible-workflow-drift
  failure_classes:
  - workflow-doctrine-gap
  finding: 'During live closeout of ART epic #247, POST /v1/delivery-work-items/{work_item_id}/parking
    successfully retired work items #343 and #344, but npm run api:probe still failed
    because the documented DeliveryWorkItemParkingResponse schema rejects `review_date: null`
    and `targetPi: null`. The route worked, but the supported probe falsely reported
    failure in the same session and exposed another nullable-response contract gap.'
  source_refs:
  - 'conversation: api:probe parking calls for work-item-343 and work-item-344 failed
    schema validation on nullable review_date and targetPi after successful live retire writes'
resolution:
  after_action_ref: null
  control_refs:
  - type: doc
    path: operator-orchestration-service/docs/api/openapi.json
    owner_repo: operator-orchestration-service
    note: The documented parking and projection schemas now allow nullable `review_date`, `targetPi`, and note-application fields that the live broker can legitimately return.
  - type: script
    path: operator-orchestration-service/scripts/validate_api_docs.mjs
    owner_repo: operator-orchestration-service
    note: Fails closed if the documented nullable projection and note-application fields drift back to non-null-only schemas.
  - type: doc
    path: operator-orchestration-service/docs/contracts/delivery-workflow-api-v1.md
    owner_repo: operator-orchestration-service
    note: Documents that parking responses can return null review dates, null PI commitments, and null note application.
  - type: doc
    path: operator-orchestration-service/docs/records/change-records/2026-04-25-art-probe-nullable-response-contracts.md
    owner_repo: operator-orchestration-service
    note: Records the nullable-response contract correction and its live probe proof after merge.
  note: Closed by merged `operator-orchestration-service#61` at commit `ba2f614`.
