schema_version: 1
id: 2026-04-25-art-parking-probe-nullable-field-contract-drift
title: Allow nullable parking response fields in ART probe contracts
recorded_on: '2026-04-25'
owner_repo: operator-orchestration-service
summary: The supported ART parking probe now reports a contract failure on valid
  retire responses because the response schema still requires `parking.review_date`
  and `work_item.targetPi` to be strings, even though retire transitions and
  uncommitted backlog work legitimately return `null` for those fields.
regression_of: null
status: closed
source_type: machine-audit
