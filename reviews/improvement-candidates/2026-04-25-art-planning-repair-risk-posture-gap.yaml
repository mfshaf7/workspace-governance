schema_version: 1
id: 2026-04-25-art-planning-repair-risk-posture-gap
title: Planning repair accepts risk posture fields at the API edge but drops them
  before the governed repair write
recorded_on: '2026-04-25'
owner_repo: workspace-governance
summary: The governed ART planning-repair route parses risk posture fields such as
  Risk Owner, Risk Review Date, Risk Disposition, and ROAM State, but the delivery
  service did not forward them into the bounded work-item update. Risk correction
  then fell back to an ad hoc update route instead of staying inside one governed
  planning-repair workflow.
regression_of: null
status: closed
source_type: conversation
scope:
  related_repos:
  - operator-orchestration-service
  - workspace-governance
  related_products: []
  related_components: []
  change_classes:
