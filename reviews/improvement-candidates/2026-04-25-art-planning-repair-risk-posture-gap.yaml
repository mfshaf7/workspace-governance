signals:
- id: operator-repeated-mistake-callout
  title: The operator explicitly said the risk path also needs a real fix, not another
    guess.
  trigger: repeated-operator-friction
  failure_classes:
  - workflow-doctrine-gap
  finding: During `#304` closeout cleanup, the only way to repair risk item `#317`
    was a fallback generic update even though the planning-repair API already accepted
    `risk_owner`, `risk_review_date`, `risk_disposition`, and `roam_state`. The
    broker service was silently dropping those fields before the bounded repair write,
    so the advertised governed planning-repair path was incomplete for risks.
  source_refs:
  - 'conversation: operator explicitly called out that the risk path also needs a
    real fix rather than another guessed closeout retry'
resolution:
  after_action_ref: null
  control_refs:
  - type: workflow
    path: operator-orchestration-service/src/delivery-service.js
    owner_repo: operator-orchestration-service
    note: Forwards risk posture fields through initiative planning-repair so risk correction stays inside the governed repair workflow.
  - type: test
    path: operator-orchestration-service/test/delivery-service.test.js
    owner_repo: operator-orchestration-service
    note: Proves that planning-repair now carries `risk_owner`, `risk_review_date`, `risk_disposition`, and `roam_state` into the bounded update path.
  - type: test
    path: operator-orchestration-service/test/http.test.js
    owner_repo: operator-orchestration-service
    note: Proves that the API edge forwards risk posture fields into the delivery-service repair input.
  - type: doc
    path: operator-orchestration-service/docs/contracts/delivery-workflow-api-v1.md
    owner_repo: operator-orchestration-service
    note: Makes risk posture correction an explicit supported planning-repair capability on the operator-facing broker contract.
  note: Risk posture correction no longer requires a fallback generic item update; the governed planning-repair path now carries the full risk posture fields end to end.
