signals:
- id: repeated-corrective-follow-up
  title: The same workflow needed another corrective follow-up in the same task or
    session.
  trigger: machine-visible-workflow-drift
  failure_classes:
  - workflow-doctrine-gap
  finding: 'During live closeout of ART work items #331, #320, and #332, POST /v1/delivery-work-items/{work_item_id}/complete
    successfully persisted done state and valid completion evidence, but npm run api:probe
    still failed because the documented DeliveryWorkItemCompleteResponse schema expects
    note_applied to be a string. The repeated mismatch forces manual readback to prove
    success and makes the supported closeout probe look broken in the same session.'
  source_refs:
  - 'conversation: repeated api:probe complete calls for work-item-331, work-item-320,
    and work-item-332 failed schema validation on note_applied null after successful
    live completion writes'
resolution:
  after_action_ref: null
  control_refs:
  - type: doc
    path: operator-orchestration-service/docs/api/openapi.json
    owner_repo: operator-orchestration-service
    note: The documented complete and stale-open response schemas now allow nullable `note_applied` values and share the broader nullable projection fix.
  - type: script
    path: operator-orchestration-service/scripts/validate_api_docs.mjs
    owner_repo: operator-orchestration-service
    note: Fails closed if the documented `note_applied` fields drift back to string-only schemas.
  - type: doc
    path: operator-orchestration-service/docs/contracts/delivery-workflow-api-v1.md
    owner_repo: operator-orchestration-service
    note: Documents that completion and stale-open responses may legitimately return `note_applied = null`.
  - type: doc
    path: operator-orchestration-service/docs/records/change-records/2026-04-25-art-probe-nullable-response-contracts.md
    owner_repo: operator-orchestration-service
    note: Records the nullable-response contract correction and the operator-facing proof path.
