schema_version: 1
id: 2026-04-25-art-complete-probe-note-applied-null-contract-drift
title: Allow nullable note_applied in ART completion probe responses
recorded_on: '2026-04-25'
owner_repo: operator-orchestration-service
summary: The supported ART completion probe now repeatedly reports a contract failure
  even when the live broker completion write succeeds because the response schema
  still requires note_applied to be a string while the real route returns null when
  no extra operator note is applied.
regression_of: null
status: closed
source_type: machine-audit
scope:
