    path: operator-orchestration-service/scripts/validate_completion_evidence.mjs
    owner_repo: operator-orchestration-service
    note: Adds a local fail-closed preflight so malformed ART completion evidence
      is rejected before the broker write.
  - type: doc
    path: operator-orchestration-service/docs/operations/delivery-workflow-operator-surface.md
    owner_repo: operator-orchestration-service
    note: Makes the exact completion-evidence prefixes and preflight step explicit
      on the operator-facing broker surface.
  - type: skill
    path: workspace-governance/skills-src/project-delivery-operator/SKILL.md
    owner_repo: workspace-governance
    note: Requires the local completion-evidence preflight before the broker
      complete write in ART sessions.
  note: The broker completion path now has a local preflight command, the operator-facing
    contract states the exact evidence prefixes, and the ART skill requires that
    preflight before the complete write.
