  finding: I checked the broker route contract for POST /v1/delivery-work-items/{work_item_id}/complete
    but did not verify the stricter evidence-format guardrail before posting completion
    evidence. The broker rejected the write because Test Result Evidence and Validation
    Evidence require PASS/FAIL/CHECK/NOT APPLICABLE bullet prefixes rather than raw
    command lines.
  source_refs:
  - 'conversation: operator asked whether the guardrails had been checked after the
    broker rejected the ART closeout write for evidence formatting'
resolution:
  after_action_ref: null
