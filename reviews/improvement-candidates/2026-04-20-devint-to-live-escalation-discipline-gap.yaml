  change_classes:
    - platform-contract
    - runtime-composition
signals:
  - id: accepted-idea-delivery-devint-escalation-miss
    title: Stage/shared-runtime debugging continued after the first live miss instead of re-grounding on the dev-integration lane
    trigger: repeated-manual-retrospective
    failure_classes:
      - workflow-doctrine-gap
      - unsafe-assumption
    finding: >-
      The active accepted-idea-delivery profile already existed specifically to
      prove the proposal-to-delivery workflow in disposable local k3s before
      any governed stage/shared-runtime rehearsal. That local proof was done,
      but after the first live consume miss the remaining failures were treated
      like workflow-step bugs inside the shared runtime rather than being
      reclassified as a broader live OpenProject boundary problem. This led to
      repeated trial-and-error against the live shared runtime, even though the
      profile doctrine explicitly says it exists to avoid using the governed
      lane to discover project-model, identity-scope, or backlink mistakes.
    source_refs:
      - 'conversation:2026-04-20-user-asked-why-dev-integration-was-not-used-to-avoid-stage-trial-and-error'
      - 'conversation:2026-04-20-accepted-idea-delivery-live-rehearsal-required-multiple-broker-hardening-repins'
resolution:
  after_action_ref: null
  control_refs:
    - type: contract
      path: workspace-governance/contracts/developer-integration-policy.yaml
      owner_repo: workspace-governance
      note: Adds live_miss_escalation routing for return-to-devint, platform/backend-boundary, or governed-rehearsal decisions.
    - type: validator
      path: workspace-governance/scripts/validate_developer_integration.py
      owner_repo: workspace-governance
      note: Fails the dev-integration contract when live_miss_escalation is missing or incomplete.
    - type: doc
      path: workspace-governance/docs/work-home-routing-contract.md
      owner_repo: workspace-governance
      note: Publishes the operator-facing classification rule for live misses after dev-integration proof.
    - type: skill
      path: workspace-governance/skills-src/dev-integration-first/SKILL.md
      owner_repo: workspace-governance
      note: Teaches future sessions to classify first serious live/shared-runtime misses before patching.
  note: >-
    Still relevant, and closed by adding first-class live-miss escalation rules
    to the dev-integration lane contract. The selected design is not to force
    every miss back into devint; it classifies whether the miss belongs to the
    profile-owned workflow, the platform/backend boundary, or governed rehearsal.
