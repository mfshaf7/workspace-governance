  title: PM2 and ART design discussion omitted blocker-governance expectations until
    the operator asked
  trigger: late-architecture-discovery
  failure_classes:
  - workflow-doctrine-gap
  finding: "The PM\xB2 plus one-ART design discussion covered intake, execution structure,\
    \ and governance phases, but it did not proactively include blocker or impediment\
    \ handling rules. The operator had to call out that blockers require discussion,\
    \ choice of removal versus workaround, and mandatory justification."
  source_refs:
  - conversation:2026-04-19-blocker-justification-omitted-in-enterprise-design
