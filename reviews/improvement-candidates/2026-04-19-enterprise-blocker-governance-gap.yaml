title: Enterprise workflow design should surface blocker handling and justification
  up front
recorded_on: '2026-04-19'
owner_repo: workspace-governance
summary: When designing enterprise-grade delivery workflows, Codex should explicitly
  surface blocker and impediment governance early, including whether to remove the
  blocker, use a workaround, accept risk, or defer, with justification required for
  the chosen path.
