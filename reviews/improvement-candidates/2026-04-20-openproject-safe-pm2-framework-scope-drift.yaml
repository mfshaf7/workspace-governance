signals:
  - id: openproject-delivery-art-framework-scope-drift
    title: Operator expected full SAFe plus PM² surface, but the live delivery project only exposes the bounded v1 hierarchy and fields
    trigger: repeated-manual-retrospective
    failure_classes:
      - workflow-doctrine-gap
      - contract-drift
    finding: >-
      The delivery-art contract and user discussion set the expectation of a
      SAFe-aligned one-ART model with PM² governance. The actual activated
      project only enables work-package tracking and provisions types, statuses,
      and PM² fields. It does not create Program Increment versions, Kanban
      boards, or a board-capable operator surface, so the resulting UI does not
      match the user's understanding of the agreed framework.
    source_refs:
      - 'conversation:2026-04-20-user-asked-where-the-kanban-board-is'
      - '/home/mfshaf7/projects/platform-engineering/products/openproject/delivery-art-contract.md'
      - '/home/mfshaf7/projects/platform-engineering/products/openproject/runbooks/configure-delivery-art.md'
resolution:
  after_action_ref: null
  control_refs:
    - type: contract
      path: platform-engineering/products/openproject/delivery-art-contract.md
      owner_repo: platform-engineering
      note: The delivery-art contract now defines the full consume-to-PI-planning model, canonical PI placement, and the SAFe plus PM² execution shape.
    - type: runbook
      path: platform-engineering/products/openproject/runbooks/plan-delivery-art.md
      owner_repo: platform-engineering
      note: Operators now have one primary instruction surface for consume, PI planning, rolling-wave elaboration, and carryover discipline.
    - type: validator
      path: platform-engineering/products/openproject/scripts/openproject_check_delivery_art_quality.py
      owner_repo: platform-engineering
      note: The ART quality gate now fail-closes on PI-commitment drift, backlog-story overexpansion, and roadmap projection mismatch.
    - type: contract
      path: operator-orchestration-service/docs/contracts/delivery-workflow-api-v1.md
      owner_repo: operator-orchestration-service
      note: The broker contract now enforces the same planning workflow and PI-commitment rules through the operator API.
    - type: workflow
      path: operator-orchestration-service/src/openproject-client.js
      owner_repo: operator-orchestration-service
      note: Broker create, update, move, and bulk-update paths now reject planning drift instead of allowing a looser bounded hierarchy.
  note: >-
    The delivery ART now has explicit PI versions, roadmap projection from
    canonical `Target PI`, a machine-enforced SAFe-aligned type taxonomy, one
    governed planning runbook, and fail-closed broker plus quality-gate
    enforcement for consume, PI commitment, and rolling-wave elaboration. The
    operator-facing scope now matches the declared SAFe plus PM² planning
    model closely enough to close the earlier scope-drift gap directly.
