schema_version: 1
id: 2026-04-20-openproject-safe-pm2-framework-scope-drift
title: OpenProject delivery ART was activated with only the bounded hierarchy and field model, not the full agreed SAFe plus PM² operating surface
recorded_on: '2026-04-20'
owner_repo: workspace-governance
summary: >-
  The agreed OpenProject direction was PM² governance plus a SAFe-aligned
  one-ART delivery model. The current implementation did create the delivery
  project, hierarchy, statuses, and PM² governance fields, but it stopped short
  of provisioning PI versions, Kanban boards, or other operator-visible SAFe
  execution views. The current docs do disclose some of that narrowing, but the
  operator expectation remained "full SAFe plus PM²", so the effective rollout
  scope drifted from the agreed framework and left the UI weaker than intended.
status: closed
source_type: conversation
