owner_repo: workspace-governance
summary: 'During #477, local validation was treated as sufficient before the committed
  PR diff existed, CI caught the missing change record, and an earlier manual temp-payload
  edit bypassed the apply_patch discipline. The source blocker was fixed, but the
  broader workflow lesson must not stay in chat memory.'
