signals:
- id: operator-repeated-mistake-callout
  title: The operator explicitly said the miss is a repeated mistake and expects the
    system to learn from it.
  trigger: closed-lesson-regression
  failure_classes:
  - learning-closure-regression
  - workflow-doctrine-gap
  finding: 'The operator called out multiple failures in the round. The concrete misses
    were: plan.apply draft validation was narrower than live submit, change-record
    requirement validation was first run before the source commit so it missed the
    committed diff, and a temp ART payload was edited outside apply_patch discipline
    during planning repair.'
  source_refs:
  - 'conversation: operator said there were multiple failures in this round and asked
    whether they would all be addressed'
  - 'art: #477 source defect closed by operator-orchestration-service PR #89'
- id: repeated-corrective-follow-up
  title: The same workflow needed another corrective follow-up in the same task or session.
  trigger: repeated-operator-friction
  failure_classes:
  - workflow-doctrine-gap
  finding: >-
    The round required several corrective loops after the initial plan.apply
    planning repair: source defect #477 had to be opened after live submit
    rejected locally accepted drafts; PR #89 then needed a change record only
    after CI caught the committed diff; Review Packet readiness caught weak
    changed-surface explanations; completion-evidence preflight caught evidence
    formatting only after the first raw-input rerun. These guards worked, but
    they triggered late and should be sequenced earlier.
  source_refs:
  - 'repo: operator-orchestration-service PR #89'
  - 'review-packet: 223fcd8c13466ce4fac8a023a8a50fd99b624168818530d94c0b06d6b9019294'
  - 'command: npm run validate:change-record-requirement passed only after the change record was committed'
