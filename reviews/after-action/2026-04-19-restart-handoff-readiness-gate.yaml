schema_version: 1
id: 2026-04-19-restart-handoff-readiness-gate
title: Restart readiness should require proactive handoff refresh before recommendation
recorded_on: '2026-04-19'
owner_repo: workspace-governance
summary: Restart readiness should be treated as a decision gate. If meaningful workspace-level
  local-only state remains, Codex must refresh the current handoff before recommending
  a restart instead of waiting for the operator to ask.
scope:
  related_repos:
  - workspace-governance
  related_products: []
  related_components: []
  change_classes:
  - architecture-shaping
