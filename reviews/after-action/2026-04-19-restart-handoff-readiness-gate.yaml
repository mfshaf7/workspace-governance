lessons:
- id: restart-readiness-must-refresh-handoff-before-recommendation
  title: Restart readiness requires proactive handoff refresh
  failure_class: workflow-doctrine-gap
  trigger: repeated-operator-friction
  finding: The restart handoff rule existed, but it was phrased as a closure reminder
    rather than a decision gate. That allowed restart readiness to be stated first
    and the handoff to be refreshed only after the operator asked.
  impact: This weakens restart tests and risks losing or obscuring meaningful workspace-level
    local-only context. It also proves the agent is still relying on operator catch
    rather than enforcing the restart rule proactively at the decision point.
  status: closed
  expected_control_types:
  - contract
  - doc
  - skill
  control_refs:
  - type: doc
    path: workspace-governance/AGENTS.md
    owner_repo: workspace-governance
    note: Workspace governance now requires an explicit restart-readiness check before
      recommending restart.
  - type: doc
    path: workspace-governance/workspace-root/AGENTS.md
    owner_repo: workspace-governance
    note: Workspace root routing now carries the same proactive restart-readiness
      rule for future sessions.
  - type: skill
    path: workspace-governance/skills-src/done-criteria-enforcer/SKILL.md
    owner_repo: workspace-governance
    note: Done-criteria skill now defines a restart-readiness gate and forbids waiting
      for the operator to ask about handoff creation.
