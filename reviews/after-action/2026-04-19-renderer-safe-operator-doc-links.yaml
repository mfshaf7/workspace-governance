schema_version: 1
id: 2026-04-19-renderer-safe-operator-doc-links
title: Renderer-safe operator documentation links were not enforced
recorded_on: '2026-04-19'
owner_repo: workspace-governance
summary: A newly published operator-facing runbook used local filesystem
  markdown links that worked in the local renderer but failed in GitHub web.
  The workspace did not yet enforce a renderer-safe link rule for active
  Git-tracked docs outside the local workspace-root surface.
scope:
