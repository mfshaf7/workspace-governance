lessons:
- id: active-operator-docs-need-renderer-safe-links
  title: Active operator docs need renderer-safe navigation links
  failure_class: workflow-doctrine-gap
  trigger: repeated-operator-friction
  finding: The operator-doc doctrine required one primary instruction surface,
    but it did not yet require that active Git-tracked docs outside the local
    workspace-root surface use repo-safe or web-safe markdown links.
  impact: The runbook looked complete locally but failed for operators viewing
    it through GitHub web, creating repeated confusion and avoidable rework.
  status: closed
  expected_control_types:
  - validator
  - doc
  control_refs:
  - type: validator
    path: workspace-governance/scripts/audit_stale_content.py
    owner_repo: workspace-governance
    note: Fails active Git-tracked docs outside workspace-root when they use
      markdown links to local filesystem paths under /home/mfshaf7/projects.
  - type: doc
    path: workspace-governance/AGENTS.md
    owner_repo: workspace-governance
    note: Records the renderer-safe operator-doc rule explicitly.
  - type: doc
    path: workspace-governance/workspace-root/AGENTS.md
    owner_repo: workspace-governance
    note: Propagates the same rule into the synced workspace-root guidance.
