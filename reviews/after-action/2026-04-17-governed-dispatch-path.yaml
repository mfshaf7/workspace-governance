- id: governed-dispatch-path-must-win-over-raw-gh
  title: Governed workflow dispatch should win over raw shell auth assumptions
  failure_class: shell-reliability-miss
  trigger: shell-or-tooling-reliability-miss
  finding: The workflow dispatch step fell back to raw gh workflow run and local auth
    assumptions even though platform-engineering already published a supported secret-backed
    dispatch script for this exact operation.
  impact: The stage experiment paused on an avoidable auth blocker, created unnecessary
    operator friction, and delayed delivery even though the governed credential path
    already existed.
