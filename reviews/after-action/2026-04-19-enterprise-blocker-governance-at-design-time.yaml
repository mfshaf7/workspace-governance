schema_version: 1
id: 2026-04-19-enterprise-blocker-governance-at-design-time
title: Enterprise workflow design should include blocker governance from the start
recorded_on: '2026-04-19'
owner_repo: workspace-governance
summary: Enterprise workflow and project-management design discussions should explicitly
  include blocker and impediment governance up front, including remove versus workaround
  versus accept-risk versus defer, with justification required for the chosen path.
scope:
  related_repos:
  - platform-engineering
  - workspace-governance
  related_products:
  - openproject
  related_components: []
  change_classes:
  - architecture-shaping
