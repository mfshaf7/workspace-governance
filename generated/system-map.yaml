schema_version: 1
repos:
  workspace-governance:
    lifecycle: active
    repo_class: governance
    requires_security_bindings: false
    security_review_subject: true
    owns:
    - workspace-root guidance
    - cross-repo contracts
    - workspace audit tooling
    - workspace-level skill source
    must_not_own:
    - platform rollout
    - product source
    - runtime packaging
    - security standards
    allowed_authoritative_refs:
    - platform-engineering
    - security-architecture
    - workspace-governance-control-fabric
    validation_behavior:
      posture: catalog-owner
      wgcf_graph_role: catalog-authority-source
      catalog_refs:
      - contract-model
      - intake-model
      - component-contracts
      - workspace-layout
      - codex-review-controls
      notes: Owns validator identity, admission policy, and catalog truth consumed
        by WGCF.
  workspace-governance-control-fabric:
    lifecycle: active
    repo_class: governance-runtime
    requires_security_bindings: false
    security_review_subject: true
    owns:
    - governance control-fabric runtime implementation
    - governance graph and validation planning runtime
    - admission, readiness, receipt, and ledger runtime surfaces
    - policy and projection adapters for existing governance rules
    - control-fabric API, worker, and CLI implementation
    must_not_own:
    - canonical workspace contracts
    - workspace-root guidance
    - platform deployment authority
    - security standards
    - Workspace Delivery ART work-state truth
    allowed_authoritative_refs:
    - workspace-governance
    - platform-engineering
    - security-architecture
    - operator-orchestration-service
    validation_behavior:
      posture: runtime-consumer
      wgcf_graph_role: wgcf-runtime-source
      catalog_refs:
      - contract-model
      - developer-integration
      notes: Implements WGCF runtime planning and receipts from workspace-governance
        catalog truth without redefining validator authority.
  context-governance-gateway:
    lifecycle: active
    repo_class: governance-runtime
    requires_security_bindings: true
    security_review_subject: true
    owns:
    - operational context admission implementation
    - context capture, normalization, classification, redaction, slicing, budgeting,
      and projection
    - model-safe and operator-safe packet generation
    - context manifests, redaction reports, operator receipts, artifact digests, and
      local ledger behavior
    - future API, worker, storage-adapter, and downstream adapter implementation after
      runtime admission
    must_not_own:
    - workspace contracts
    - Workspace Governance Control Fabric validation planning or readiness authority
    - Workspace Delivery ART mutation authority
    - platform deployment authority
    - security standards or security acceptance
    - custom LLM gateway, custom scanner, custom observability backend, or custom
      object store
    allowed_authoritative_refs:
    - workspace-governance
    - workspace-governance-control-fabric
    - platform-engineering
    - security-architecture
    - operator-orchestration-service
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: context-packet-provider
      catalog_refs:
      - developer-integration
      - devint-runner-read
      - security-bindings
      - review-coverage
      notes: Active implementation repo for context packet production; local dev-integration
        runtime launch is active through the platform-owned runner, while governed
        stage/prod deployment, raw projection, downstream adapters, and approval authority
        remain blocked.
  workspace-prototype-studio:
    lifecycle: active
    repo_class: product-incubation
    requires_security_bindings: false
    security_review_subject: true
    owns:
    - prototype and product-incubation source
    - prototype registry and lifecycle records
    - design baseline records before graduation
    - mock and synthetic data fixtures for prototype review
    - internal and client app prototype scaffolds before graduation
    must_not_own:
    - Workspace Delivery ART work-state truth
    - platform deployment authority
    - security acceptance
    - production releases
    - long-lived product source after graduation
    - real client data by default
    allowed_authoritative_refs:
    - workspace-governance
    - platform-engineering
    - security-architecture
    - operator-orchestration-service
    validation_behavior:
      posture: covered-by-owner-repo
      wgcf_graph_role: product-runtime-source
      catalog_refs:
      - component-contracts
      - review-coverage
      notes: Prototype Studio owns incubation source and local validation; mature
        runtime, client-visible, or real-data work must graduate into the appropriate
        governed owner path before release evidence is accepted.
  platform-engineering:
    lifecycle: active
    repo_class: platform
    requires_security_bindings: true
    owns:
    - environment contracts
    - pinned source SHAs and digests
    - Argo-managed deployment state
    - shared platform component docs
    - product integration docs and runbooks
    must_not_own:
    - canonical Telegram source
    - canonical host bridge source
    - security governance standards
    allowed_authoritative_refs:
    - security-architecture
    - openclaw-runtime-distribution
    - openclaw-telegram-enhanced
    - openclaw-host-bridge
    - workspace-governance
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: platform-authority-source
      catalog_refs:
      - openproject-quality-check
      - openproject-projection-sync
      - devint-runner-read
      - devint-runner-lifecycle
      - kubernetes-runtime-read
      - kubernetes-runtime-mutation
      notes: Owns platform runtime and reconciliation commands; WGCF may only invoke
        or recommend them through explicit profile gates.
  security-architecture:
    lifecycle: active
    repo_class: security-governance
    requires_security_bindings: false
    owns:
    - trust-boundary architecture
    - security standards
    - review methodology
    - security findings and assessments
    - product security overlays
    must_not_own:
    - rollout implementation
    - product packaging
    - operator runbooks
    allowed_authoritative_refs:
    - platform-engineering
    - openclaw-host-bridge
    - openclaw-runtime-distribution
    - openclaw-telegram-enhanced
    validation_behavior:
      posture: covered-by-owner-repo
      wgcf_graph_role: security-authority-source
      catalog_refs:
      - security-bindings
      - review-coverage
      - security-delta-reviews
      - security-evidence
      - security-change-record-lanes
      notes: Security posture remains authority-owned here; WGCF surfaces missing
        review evidence but does not approve or replace security decisions.
  openclaw-runtime-distribution:
    lifecycle: active
    repo_class: product-runtime
    requires_security_bindings: true
    owns:
    - active OpenClaw runtime composition
    - packaged runtime seam verification
    - active host-control plugin package
    - runtime-required workspace templates
    must_not_own:
    - canonical Telegram source
    - canonical host bridge source
    - environment approval
    - Argo deployment state
    allowed_authoritative_refs:
    - openclaw-telegram-enhanced
    - openclaw-host-bridge
    - platform-engineering
    - security-architecture
    validation_behavior:
      posture: covered-by-owner-repo
      wgcf_graph_role: product-runtime-source
      catalog_refs:
      - component-contracts
      - security-bindings
      - review-coverage
      notes: Runtime distribution validation stays source-owned and is represented
        to WGCF through component and security catalog coverage.
  openclaw-host-bridge:
    lifecycle: active
    repo_class: runtime-enforcement
    requires_security_bindings: true
    owns:
    - host-side policy enforcement
    - allowed roots
    - audit logging
    - host export staging
    - host runtime attestation
    - WSL and Windows bridge behavior
    must_not_own:
    - Telegram UX
    - environment promotion
    - image composition
    allowed_authoritative_refs:
    - platform-engineering
    - security-architecture
    - openclaw-runtime-distribution
    - openclaw-telegram-enhanced
    validation_behavior:
      posture: interface-contract-backed
      wgcf_graph_role: runtime-enforcement-source
      catalog_refs:
      - component-contracts
      - security-bindings
      - review-coverage
      notes: Host enforcement validation must remain interface-contract and security-review
        backed before WGCF can treat results as readiness evidence.
  openclaw-telegram-enhanced:
    lifecycle: active
    repo_class: product-channel
    requires_security_bindings: true
    owns:
    - canonical Telegram behavior
    - Telegram routing and approvals
    - staged media delivery behavior
    - Telegram packaging and tests
    must_not_own:
    - host enforcement
    - platform rollout
    - security standards
    allowed_authoritative_refs:
    - openclaw-runtime-distribution
    - openclaw-host-bridge
    - platform-engineering
    - security-architecture
    validation_behavior:
      posture: interface-contract-backed
      wgcf_graph_role: product-channel-source
      catalog_refs:
      - component-contracts
      - security-bindings
      - review-coverage
      notes: Telegram channel validation stays source-owned and is admitted to WGCF
        through interface-contract and security evidence coverage.
  operator-orchestration-service:
    lifecycle: active
    repo_class: shared-operator-service
    requires_security_bindings: true
    owns:
    - shared operator workflow APIs
    - workflow audit and correlation
    - provider-agnostic AI-assist orchestration for bounded operator workflows
    - OpenProject workflow adapters
    must_not_own:
    - Telegram delivery or chat UX
    - platform rollout authority
    - security standards
    - direct workspace contract mutation
    allowed_authoritative_refs:
    - workspace-governance
    - platform-engineering
    - security-architecture
    - openclaw-telegram-enhanced
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: operator-workflow-source
      catalog_refs:
      - delivery-art-broker-read
      - delivery-art-broker-mutation
      - delivery-art-api-probe-read
      - delivery-art-api-probe-mutation
      - component-contracts
      notes: OOS remains ART workflow authority; WGCF may read or recommend through
        broker-owned gates but must not directly mutate ART.
retired_repos:
  openclaw-isolated-deployment:
    lifecycle: retired
    replaced_by:
      platform_architecture: platform-engineering
      security_architecture: security-architecture
      runtime_distribution: openclaw-runtime-distribution
      host_enforcement: openclaw-host-bridge
      telegram_source: openclaw-telegram-enhanced
products:
  openclaw:
    lifecycle: fully-governed
    platform_owner: platform-engineering
    security_owner: security-architecture
    runtime_owner: openclaw-runtime-distribution
    source_owners:
    - openclaw-telegram-enhanced
    - openclaw-host-bridge
    - openclaw-runtime-distribution
    stage_supported: true
    governed_prod_promotion: true
    highest_real_endpoint: governed-prod
    validation_behavior:
      posture: covered-by-owner-repo
      wgcf_graph_role: product-readiness-aggregate
      catalog_refs:
      - component-contracts
      - security-bindings
      - review-coverage
      notes: OpenClaw product readiness is aggregated from owner-repo component contracts,
        platform release evidence, and security review posture; WGCF must not own
        promotion authority.
  openproject:
    lifecycle: platform-integrated
    platform_owner: platform-engineering
    security_owner: security-architecture
    runtime_owner: platform-engineering
    source_owners:
    - platform-engineering
    stage_supported: false
    governed_prod_promotion: false
    highest_real_endpoint: platform-integrated-runtime
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: product-readiness-aggregate
      catalog_refs:
      - delivery-art-broker-read
      - openproject-quality-check
      - openproject-projection-sync
      notes: OpenProject readiness is platform-integrated and ART-backed; WGCF may
        consume broker and platform receipts but OOS and platform-engineering retain
        mutation and runtime authority.
components:
  argo-cd:
    lifecycle: active
    component_class: shared-platform
    owner_repo: platform-engineering
    product: null
    security_owner: security-architecture
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: shared-platform-component
      catalog_refs:
      - devint-runner-read
      - kubernetes-runtime-read
      - security-bindings
      notes: Platform runtime state is visible to WGCF only through platform-owned
        profile gates and security bindings.
  vault:
    lifecycle: active
    component_class: shared-platform
    owner_repo: platform-engineering
    product: null
    security_owner: security-architecture
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: shared-platform-component
      catalog_refs:
      - devint-runner-read
      - kubernetes-runtime-read
      - security-bindings
      notes: Secret infrastructure must stay platform-owned; WGCF reads status only
        through explicit live-runtime profiles.
  external-secrets:
    lifecycle: active
    component_class: shared-platform
    owner_repo: platform-engineering
    product: null
    security_owner: security-architecture
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: shared-platform-component
      catalog_refs:
      - devint-runner-read
      - kubernetes-runtime-read
      - security-bindings
      notes: Secret delivery validation remains platform-owned and security-reviewed
        before WGCF may consume runtime evidence.
  observability:
    lifecycle: active
    component_class: shared-platform
    owner_repo: platform-engineering
    product: null
    security_owner: security-architecture
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: shared-platform-component
      catalog_refs:
      - devint-runner-read
      - kubernetes-runtime-read
      - security-bindings
      notes: Observability runtime checks are platform-owned inputs, not WGCF-owned
        validators.
  platform-postgresql:
    lifecycle: active
    component_class: shared-platform
    owner_repo: platform-engineering
    product: null
    security_owner: security-architecture
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: shared-platform-component
      catalog_refs:
      - devint-runner-read
      - kubernetes-runtime-read
      - security-bindings
      notes: Persistent platform storage evidence must pass platform and security
        gates before WGCF may use it for readiness.
  workspace-governance-control-fabric:
    lifecycle: active
    component_class: shared-governance-runtime
    owner_repo: workspace-governance-control-fabric
    product: null
    security_owner: security-architecture
    validation_behavior:
      posture: runtime-consumer
      wgcf_graph_role: shared-governance-runtime-component
      catalog_refs:
      - contract-model
      - developer-integration
      notes: WGCF is the runtime consumer of governance catalog truth and must expose
        receipts rather than owning source contracts.
  context-governance-gateway:
    lifecycle: active
    component_class: shared-governance-runtime
    owner_repo: context-governance-gateway
    product: null
    security_owner: security-architecture
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: context-packet-provider
      catalog_refs:
      - developer-integration
      - devint-runner-read
      - security-bindings
      - review-coverage
      notes: Provides model-safe/operator-safe context packets and receipts to operators,
        agents, OOS, or WGCF through an active local dev-integration profile; it still
        does not own WGCF validation, ART mutation, platform release, security acceptance,
        governed stage/prod deployment, or model invocation.
  governed-ai-gateway:
    lifecycle: active
    component_class: shared-platform
    owner_repo: platform-engineering
    product: null
    security_owner: security-architecture
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: shared-platform-component
      catalog_refs:
      - developer-integration
      - devint-runner-read
      - security-bindings
      - review-coverage
      notes: Platform-owned governed AI access-plane gateway, admitted from the prior
        ai-access-plane intake proposal into the active component inventory. Local
        dev-integration profile proof may be consumed as readiness input, but live
        model-profile activation remains blocked until platform, security, and workspace
        consumer gates pass.
  openclaw-host-bridge:
    lifecycle: active
    component_class: product-runtime
    owner_repo: openclaw-host-bridge
    product: openclaw
    security_owner: security-architecture
    validation_behavior:
      posture: interface-contract-backed
      wgcf_graph_role: product-runtime-component
      catalog_refs:
      - component-contracts
      - security-bindings
      - review-coverage
      notes: Host bridge readiness must remain interface-contract and security evidence
        backed.
    interface_contract:
      path: contracts/interface-manifest.json
      validation_command: npm run test:interface-contract
  openclaw-telegram-channel:
    lifecycle: active
    component_class: product-channel
    owner_repo: openclaw-telegram-enhanced
    product: openclaw
    security_owner: security-architecture
    validation_behavior:
      posture: interface-contract-backed
      wgcf_graph_role: product-channel-component
      catalog_refs:
      - component-contracts
      - security-bindings
      - review-coverage
      notes: Telegram channel readiness must remain interface-contract and security
        evidence backed.
    interface_contract:
      path: contracts/interface-manifest.json
      validation_command: npm run test:host-control-contract
  openclaw-runtime-distribution:
    lifecycle: active
    component_class: product-runtime
    owner_repo: openclaw-runtime-distribution
    product: openclaw
    security_owner: security-architecture
    validation_behavior:
      posture: covered-by-owner-repo
      wgcf_graph_role: product-runtime-component
      catalog_refs:
      - security-bindings
      - review-coverage
      notes: Runtime distribution validation is owner-repo and security-review backed;
        WGCF consumes summarized readiness, not raw rollout authority.
  host-control-plugin:
    lifecycle: active
    component_class: product-plugin
    owner_repo: openclaw-runtime-distribution
    product: openclaw
    security_owner: security-architecture
    validation_behavior:
      posture: interface-contract-backed
      wgcf_graph_role: product-plugin-component
      catalog_refs:
      - component-contracts
      - security-bindings
      - review-coverage
      notes: The packaged host-control plugin must keep interface-contract evidence
        before WGCF may use its readiness posture.
    interface_contract:
      path: host-control-openclaw-plugin/contracts/interface-manifest.json
      validation_command: npm --prefix host-control-openclaw-plugin run test:interface-contract
  operator-orchestration-service:
    lifecycle: active
    component_class: shared-platform
    owner_repo: operator-orchestration-service
    product: null
    security_owner: security-architecture
    validation_behavior:
      posture: interface-contract-backed
      wgcf_graph_role: operator-workflow-component
      catalog_refs:
      - component-contracts
      - delivery-art-broker-read
      - delivery-art-api-probe-read
      notes: OOS interface validation and broker read probes are WGCF inputs, while
        ART mutations remain OOS-owned.
    interface_contract:
      path: contracts/interface-manifest.json
      validation_command: npm test
