schema_version: 1
profiles:
  accepted-idea-delivery:
    lifecycle: active
    owner_repo: operator-orchestration-service
    summary: Persistent local-k3s dev-integration workbench for the accepted-idea delivery broker and OpenProject ART operator surfaces.
    purpose: Preserve the current accepted-idea delivery working lane for local ART execution, broker reads, and operator access while keeping shared smoke read-only and moving mutating consume rehearsal into a disposable companion profile.
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: dev-integration-profile
      catalog_refs:
        - delivery-art-broker-read
        - openproject-quality-check
        - devint-runner-read
      notes: WGCF may consume accepted-idea-delivery profile evidence through explicit dev-integration gates while OOS keeps ART mutation authority and platform-engineering owns runtime lifecycle.
    profile_path: dev-integration/profiles/accepted-idea-delivery/profile.yaml
    runtime_owner: platform-engineering
    security_owner: security-architecture
    requested_by: mfshaf7
    requested_on: "2026-04-19"
    request_record:
      system: doc
      ref: repo://platform-engineering/docs/decisions/adr/ADR-013-openproject-proposal-to-delivery-split-and-one-art-model.md
    admission:
      approved_by: mfshaf7
      approved_on: "2026-04-20"
      platform_acceptance_ref: repo://platform-engineering/docs/records/change-records/2026-04-20-accepted-idea-delivery-dev-integration-admission.md
      security_review_required: true
      security_review_refs:
        - repo: security-architecture
          path: docs/reviews/platform/2026-04-18-dev-integration-local-k3s-lane.md
        - repo: security-architecture
          path: docs/reviews/components/2026-04-20-operator-orchestration-service-dev-integration-accepted-idea-delivery.md
    shared_dependencies:
      - platform-engineering
    source_repos:
      - operator-orchestration-service
      - platform-engineering
    stage_handoff:
      owner_repo: platform-engineering
      governed_surface: openproject-stage-delivery-art-workbench
      required_checks:
        - broker readiness
        - proposal backlog list read
        - delivery artifact mutation draft workflow
        - WGCF ART readiness is required for broker completion-style mutations
        - optimized ART packet reads
        - landing-unit closeout evidence read
        - proposal project verification
        - delivery-art project verification
    actions:
      - up
      - status
      - access
      - smoke
      - down
      - reset
      - promote_check
  accepted-idea-delivery-mutation-smoke:
    lifecycle: active
    owner_repo: operator-orchestration-service
    summary: Disposable local-k3s dev-integration profile for isolated accepted-idea consume and backlink smoke away from the persistent ART lane.
    purpose: Run mutating accepted-idea delivery smoke against a disposable local runtime so test artifacts never land in the persistent accepted-idea-delivery working lane.
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: dev-integration-profile
      catalog_refs:
        - delivery-art-broker-read
        - devint-runner-read
      notes: WGCF may observe disposable mutation-smoke readiness only through explicit profile gates; persistent ART state and mutation decisions stay with OOS.
    profile_path: dev-integration/profiles/accepted-idea-delivery-mutation-smoke/profile.yaml
    runtime_owner: platform-engineering
    security_owner: security-architecture
    requested_by: mfshaf7
    requested_on: "2026-04-24"
    request_record:
      system: openproject
      ref: openproject://work_packages/222
    admission:
      approved_by: mfshaf7
      approved_on: "2026-04-24"
      platform_acceptance_ref: repo://platform-engineering/docs/records/change-records/2026-04-24-devint-persistent-smoke-isolation.md
      security_review_required: false
      security_review_refs: []
    shared_dependencies:
      - platform-engineering
    source_repos:
      - operator-orchestration-service
      - platform-engineering
    stage_handoff:
      owner_repo: platform-engineering
      governed_surface: openproject-stage-delivery-art-consumption
      required_checks:
        - accepted idea lookup
        - delivery-art project verification
        - consume accepted idea
        - backlink verification
    actions:
      - up
      - status
      - access
      - smoke
      - down
      - reset
      - promote_check
