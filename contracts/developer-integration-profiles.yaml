      - promote_check
  context-governance-gateway:
    lifecycle: active
    owner_repo: context-governance-gateway
    summary: Active local-k3s dev-integration lane for Context Governance Gateway service-mode proof.
    purpose: Authorize self-serve local CGG API, worker, PostgreSQL, MinIO/S3-compatible artifact custody, packet receipt, and audit-ledger proof through the shared platform runner after owner, platform, and security gates, without treating the profile as governed stage or production readiness.
    validation_behavior:
      posture: profile-gated-external-owner
      wgcf_graph_role: context-packet-provider
      catalog_refs:
        - developer-integration
        - devint-runner-read
        - security-bindings
        - review-coverage
      notes: The CGG profile is active for local dev-integration launch and read-only smoke through the platform-owned runner. It remains local-only evidence and does not authorize governed stage/prod deployment, raw model projection, downstream adapters, or CGG approval authority.
    profile_path: dev-integration/profiles/context-governance-gateway/profile.yaml
    runtime_owner: platform-engineering
    security_owner: security-architecture
