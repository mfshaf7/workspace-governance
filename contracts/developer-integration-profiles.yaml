schema_version: 1
profiles:
  accepted-idea-delivery:
    lifecycle: active
    owner_repo: operator-orchestration-service
    summary: Persistent local-k3s dev-integration workbench for the accepted-idea delivery broker and OpenProject ART operator surfaces.
    purpose: Preserve the current accepted-idea delivery working lane for local ART execution, broker reads, and operator access while keeping shared smoke read-only and moving mutating consume rehearsal into a disposable companion profile.
    profile_path: dev-integration/profiles/accepted-idea-delivery/profile.yaml
    runtime_owner: platform-engineering
    security_owner: security-architecture
    requested_by: mfshaf7
    requested_on: "2026-04-19"
    request_record:
      system: doc
      ref: repo://platform-engineering/docs/decisions/adr/ADR-013-openproject-proposal-to-delivery-split-and-one-art-model.md
    admission:
      approved_by: mfshaf7
      approved_on: "2026-04-20"
      platform_acceptance_ref: repo://platform-engineering/docs/records/change-records/2026-04-20-accepted-idea-delivery-dev-integration-admission.md
      security_review_required: true
      security_review_refs:
        - repo: security-architecture
          path: docs/reviews/platform/2026-04-18-dev-integration-local-k3s-lane.md
        - repo: security-architecture
          path: docs/reviews/components/2026-04-20-operator-orchestration-service-dev-integration-accepted-idea-delivery.md
    shared_dependencies:
      - platform-engineering
    source_repos:
      - operator-orchestration-service
      - platform-engineering
    stage_handoff:
      owner_repo: platform-engineering
      governed_surface: openproject-stage-delivery-art-workbench
      required_checks:
        - broker readiness
        - proposal backlog list read
        - delivery artifact mutation draft workflow
        - WGCF ART readiness is required for broker completion-style mutations
        - proposal project verification
        - delivery-art project verification
    actions:
      - up
      - status
      - access
      - smoke
      - down
      - reset
      - promote_check
  accepted-idea-delivery-mutation-smoke:
    lifecycle: active
    owner_repo: operator-orchestration-service
    summary: Disposable local-k3s dev-integration profile for isolated accepted-idea consume and backlink smoke away from the persistent ART lane.
    purpose: Run mutating accepted-idea delivery smoke against a disposable local runtime so test artifacts never land in the persistent accepted-idea-delivery working lane.
    profile_path: dev-integration/profiles/accepted-idea-delivery-mutation-smoke/profile.yaml
    runtime_owner: platform-engineering
    security_owner: security-architecture
    requested_by: mfshaf7
    requested_on: "2026-04-24"
    request_record:
      system: openproject
      ref: openproject://work_packages/222
    admission:
      approved_by: mfshaf7
      approved_on: "2026-04-24"
      platform_acceptance_ref: repo://platform-engineering/docs/records/change-records/2026-04-24-devint-persistent-smoke-isolation.md
      security_review_required: false
      security_review_refs: []
    shared_dependencies:
      - platform-engineering
    source_repos:
      - operator-orchestration-service
      - platform-engineering
    stage_handoff:
      owner_repo: platform-engineering
      governed_surface: openproject-stage-delivery-art-consumption
      required_checks:
        - accepted idea lookup
        - delivery-art project verification
        - consume accepted idea
        - backlink verification
    actions:
      - up
      - status
      - access
      - smoke
      - down
      - reset
      - promote_check
  governance-control-fabric:
    lifecycle: active
    owner_repo: workspace-governance-control-fabric
    summary: Persistent local-k3s dev-integration profile for the Workspace
      Governance Control Fabric API runtime and PostgreSQL metadata store.
    purpose: Provide a real local-k3s API Service and persistent PostgreSQL
      metadata store for WGCF contract and Governance Operations Console
      consumption work while keeping governed stage/prod deployment and worker
      activation gated.
    profile_path: dev-integration/profiles/governance-control-fabric/profile.yaml
    runtime_owner: platform-engineering
    security_owner: security-architecture
    requested_by: mfshaf7
    requested_on: "2026-04-30"
    request_record:
      system: openproject
      ref: openproject://work_packages/475
    admission:
      approved_by: mfshaf7
      approved_on: "2026-04-30"
      platform_acceptance_ref: repo://platform-engineering/docs/records/change-records/2026-04-30-wgcf-devint-runtime-access.md
      security_review_required: true
      security_review_refs:
        - repo: security-architecture
          path: docs/reviews/components/2026-04-30-workspace-governance-control-fabric-devint-runtime.md
    shared_dependencies:
      - platform-engineering
      - workspace-governance
    source_repos:
      - workspace-governance-control-fabric
      - workspace-governance
      - platform-engineering
    stage_handoff:
      owner_repo: platform-engineering
      governed_surface: workspace-governance-control-fabric-stage
      required_checks:
        - API readiness
        - component inventory read
        - authority contract load
        - database migration
        - validation planner dry run
        - receipt and ledger metadata read
    actions:
      - up
      - status
      - access
      - smoke
      - down
      - reset
      - promote_check
  idea-workflow:
    lifecycle: active
    owner_repo: operator-orchestration-service
    summary: Local-k3s dev-integration profile for the broker-owned idea workflow, local OpenProject backlog model, and Telegram command harness.
    purpose: Fast local rehearsal of the broker-owned idea workflow before governed stage rehearsal and rollout.
    profile_path: dev-integration/profiles/idea-workflow/profile.yaml
    runtime_owner: platform-engineering
    security_owner: security-architecture
    requested_by: mfshaf7
    requested_on: "2026-04-18"
    request_record:
      system: git
      ref: github://mfshaf7/operator-orchestration-service/pull/11
    admission:
      approved_by: mfshaf7
      approved_on: "2026-04-18"
      platform_acceptance_ref: github://mfshaf7/platform-engineering/pull/104
      security_review_required: true
      security_review_refs:
        - repo: security-architecture
          path: docs/reviews/platform/2026-04-18-dev-integration-local-k3s-lane.md
        - repo: security-architecture
          path: docs/reviews/components/2026-04-18-operator-orchestration-service-dev-integration-idea-workflow.md
    shared_dependencies:
      - openclaw-telegram-enhanced
      - platform-engineering
    source_repos:
      - operator-orchestration-service
      - openclaw-telegram-enhanced
      - platform-engineering
    stage_handoff:
      owner_repo: platform-engineering
      governed_surface: openclaw-stage-idea-workflow
      required_checks:
        - /idea help
        - /idea <text>
        - /idea list status <status>
        - /idea triage <idea-id> <summary>
        - /idea decide <idea-id> <parked|accepted|rejected> <notes>
        - /idea show <idea-id> including internal evaluation metadata readback
    actions:
      - up
      - status
      - access
      - smoke
      - down
      - reset
      - promote_check
