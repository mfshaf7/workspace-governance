schema_version: 1
repo: operator-orchestration-service
lifecycle: active
required_repo_refs:
  - workspace-governance
  - platform-engineering
  - security-architecture
  - openclaw-telegram-enhanced
required_patterns:
  readme:
    - shared operator-facing workflow service
    - OpenProject
  agents:
    - stable workflow APIs
    - Telegram UX or transport behavior
forbidden_patterns:
  readme: []
  agents: []
review_control_requirements:
  guidance_files:
    - path: AGENTS.md
      heading: "## Review guidelines"
      required_terms:
        - unbounded agentic behavior
        - operator-approval
        - OpenProject schema
        - workspace-governance mutation
        - governed ai
  required_github_paths:
    - .github/CODEOWNERS
    - .github/pull_request_template.md
  required_validation_paths:
    - .github/workflows/validate-governance-docs.yaml
  pr_template_path: .github/pull_request_template.md
  required_pr_template_sections:
    - "## Summary"
    - "## Governance Declaration"
    - "## Documentation Updates"
    - "## Validation"
    - "## Codex Review"
    - "## Review Gates"
security_requirements:
  security_owner: security-architecture
  review_checklist_path: docs/reviews/security-review-checklist.md
  review_output_path: docs/reviews/components/2026-04-18-operator-orchestration-service-runtime-admission.md
  required_artifacts:
    - id: operator-orchestration-component-view
      path: docs/architecture/components/operator-orchestration-service/README.md
      review_areas:
        - identity
        - secrets
        - delivery
        - runtime
      required_in_docs:
        - readme
        - agents
    - id: ai-security-and-governance
      path: docs/standards/ai-security-and-governance.md
      review_areas:
        - ai
      required_in_docs:
        - readme
        - agents
  delta_review_triggers:
    - id: broker-runtime-and-caller-surface
      summary: Broker runtime, auth, secret-delivery, or dev-integration profile changes that alter the shared workflow service boundary.
      review_areas:
        - identity
        - secrets
        - delivery
        - runtime
      path_globs:
        - src/config.js
        - src/runtime.js
        - src/server.js
        - src/app.js
        - src/audit.js
        - dev-integration/profiles/**
        - Dockerfile
      review_subjects:
        - inventory_section: repos
          name: operator-orchestration-service
    - id: openproject-delivery-adapter-and-api
      summary: OpenProject delivery workflow APIs or adapter mappings changed.
      review_areas:
        - identity
        - secrets
        - delivery
        - runtime
      path_globs:
        - src/openproject-client.js
        - src/delivery-service.js
        - src/delivery-model.js
        - docs/contracts/delivery-workflow-api-v1.md
        - docs/contracts/openproject-adapter-v1.md
        - docs/contracts/accepted-idea-delivery-closeout-v1.md
        - docs/contracts/accepted-idea-delivery-consumption-v1.md
      review_subjects:
        - inventory_section: repos
          name: operator-orchestration-service
        - inventory_section: products
          name: openproject
security_change_record_requirements:
  change_record_readme_path: docs/records/change-records/README.md
  policy_path: docs/records/change-records/policy.yaml
  validator_script_path: scripts/validate_change_record_requirement.py
  workflow_path: .github/workflows/validate-governance-docs.yaml
  pr_template_path: .github/pull_request_template.md
  required_in_docs:
    - readme
    - agents
