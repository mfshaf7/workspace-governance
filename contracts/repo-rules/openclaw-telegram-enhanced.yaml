schema_version: 1
repo: openclaw-telegram-enhanced
lifecycle: active
required_repo_refs:
  - openclaw-runtime-distribution
  - openclaw-host-bridge
  - platform-engineering
required_patterns:
  readme:
    - canonical Telegram channel plugin source
    - copied source
  agents:
    - canonical Telegram channel plugin source
    - Telegram-specific UX
forbidden_patterns:
  readme:
    - deployment workspace copy
    - bundled build input
    - in the isolated deployment workflow
  agents: []
review_control_requirements:
  guidance_files:
    - path: AGENTS.md
      heading: "## Review guidelines"
      required_terms:
        - backend truth
        - credential custody
        - docs/operator-commands.md
        - stage verification
  required_github_paths:
    - .github/CODEOWNERS
    - .github/pull_request_template.md
  required_validation_paths:
    - .github/workflows/validate-governance-docs.yaml
  pr_template_path: .github/pull_request_template.md
  required_pr_template_sections:
    - "## Summary"
    - "## Governance Declaration"
    - "## Documentation Updates"
    - "## Validation"
    - "## Codex Review"
    - "## Review Gates"
security_requirements:
  security_owner: security-architecture
  review_checklist_path: docs/reviews/security-review-checklist.md
  review_output_path: docs/reviews/components/2026-04-18-openclaw-telegram-channel-security-baseline.md
  required_artifacts:
    - id: telegram-channel-component-view
      path: docs/architecture/components/openclaw-telegram-channel/README.md
      review_areas:
        - runtime
      required_in_docs:
        - readme
        - agents
    - id: openclaw-data-flow
      path: docs/architecture/products/openclaw/data-flow-and-boundaries.md
      review_areas:
        - runtime
      required_in_docs:
        - readme
        - agents
    - id: ai-and-agentic-domain
      path: docs/architecture/domains/ai-and-agentic.md
      review_areas:
        - ai
        - identity
      required_in_docs:
        - readme
        - agents
  delta_review_triggers:
    - id: telegram-command-routing-and-approval-surface
      summary: Telegram routing, approvals, backend invocation, or operator command behavior changed.
      review_areas:
        - identity
        - delivery
        - runtime
        - ai
      path_globs:
        - src/**
        - api.ts
        - runtime-api.ts
        - allow-from.ts
        - docs/operator-commands.md
        - contracts/interface-manifest.json
      review_subjects:
        - inventory_section: repos
          name: openclaw-telegram-enhanced
        - inventory_section: components
          name: openclaw-telegram-channel
        - inventory_section: products
          name: openclaw
security_change_record_requirements:
  change_record_readme_path: docs/records/change-records/README.md
  policy_path: docs/records/change-records/policy.yaml
  validator_script_path: scripts/validate_change_record_requirement.py
  workflow_path: .github/workflows/validate-governance-docs.yaml
  pr_template_path: .github/pull_request_template.md
  required_in_docs:
    - readme
    - agents
operator_workflow_requirements:
  workflows:
    - id: telegram-operator-commands
      summary: Telegram-native operator command families such as /platform and /idea.
      primary_surface_path: docs/operator-commands.md
      required_in_docs:
        - readme
        - agents
