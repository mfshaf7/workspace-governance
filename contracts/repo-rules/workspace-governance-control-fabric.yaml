schema_version: 1
repo: workspace-governance-control-fabric
lifecycle: active
required_repo_refs:
  - workspace-governance
  - platform-engineering
  - security-architecture
  - operator-orchestration-service
required_patterns:
  readme:
    - runtime implementation repo
    - Workspace Governance Control Fabric
    - workspace-governance
    - platform-engineering
  agents:
    - runtime implementation repo
    - workspace-governance
    - platform-engineering
    - security-architecture
forbidden_patterns:
  readme:
    - owns workspace contracts
    - owns platform deployment
    - owns security standards
  agents:
    - owns workspace contracts
    - owns platform deployment
    - owns security standards
review_control_requirements:
  guidance_files:
    - path: AGENTS.md
      heading: "## Review Guidelines"
      required_terms:
        - control-fabric contract drift
        - workspace-governance contract dependency
        - platform deployment boundary
        - security review boundary
        - validation coverage
  required_github_paths:
    - .github/CODEOWNERS
    - .github/pull_request_template.md
  required_validation_paths:
    - .github/workflows/validate.yaml
  pr_template_path: .github/pull_request_template.md
  required_pr_template_sections:
    - "## Summary"
    - "## Governance Declaration"
    - "## Documentation Updates"
    - "## Validation"
    - "## Codex Review"
    - "## Review Gates"
