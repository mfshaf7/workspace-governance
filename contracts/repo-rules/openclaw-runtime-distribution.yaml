schema_version: 1
repo: openclaw-runtime-distribution
lifecycle: active
required_repo_refs:
  - openclaw-telegram-enhanced
  - openclaw-host-bridge
  - platform-engineering
  - security-architecture
required_patterns:
  readme:
    - active stage/prod runtime composition
    - no copied Telegram source tree hidden inside the build repo
    - source SHAs and digests recorded in `platform-engineering`
  agents:
    - active stage/prod runtime composition path
    - distribution-specific verification
forbidden_patterns:
  readme:
    - deployment workspace copy
    - bundled build input
  agents: []
security_requirements:
  security_owner: security-architecture
  review_checklist_path: docs/reviews/security-review-checklist.md
  review_output_path: docs/reviews/components/2026-04-18-openclaw-runtime-distribution-security-baseline.md
  required_artifacts:
    - id: runtime-distribution-component-view
      path: docs/architecture/components/openclaw-runtime-distribution/README.md
      review_areas:
        - delivery
        - runtime
      required_in_docs:
        - readme
        - agents
    - id: openclaw-required-controls
      path: docs/architecture/products/openclaw/required-controls.md
      review_areas:
        - runtime
        - ai
      required_in_docs:
        - readme
        - agents
    - id: gitops-machine-trust
      path: docs/architecture/domains/gitops-and-machine-trust.md
      review_areas:
        - delivery
      required_in_docs:
        - readme
        - agents
security_change_record_requirements:
  change_record_readme_path: docs/records/change-records/README.md
  policy_path: docs/records/change-records/policy.yaml
  validator_script_path: scripts/validate_change_record_requirement.py
  workflow_path: .github/workflows/validate-governance-docs.yaml
  pr_template_path: .github/pull_request_template.md
  required_in_docs:
    - readme
    - agents
