schema_version: 1
repo: openclaw-host-bridge
lifecycle: active
required_repo_refs:
  - platform-engineering
  - security-architecture
required_patterns:
  readme:
    - canonical host-side enforcement layer
    - policy,
    - audit
    - runtime attestation
  agents:
    - canonical runnable host-side enforcement layer
    - host trust boundary
forbidden_patterns:
  readme: []
  agents: []
review_control_requirements:
  guidance_files:
    - path: AGENTS.md
      heading: "## Review guidelines"
      required_terms:
        - policy bypasses
        - allowed-root drift
        - runtime attestation
        - environment-scoped policy
  required_github_paths:
    - .github/CODEOWNERS
    - .github/pull_request_template.md
  required_validation_paths:
    - .github/workflows/validate-governance-docs.yaml
  pr_template_path: .github/pull_request_template.md
  required_pr_template_sections:
    - "## Summary"
    - "## Governance Declaration"
    - "## Documentation Updates"
    - "## Validation"
    - "## Codex Review"
    - "## Review Gates"
security_requirements:
  security_owner: security-architecture
  review_checklist_path: docs/reviews/security-review-checklist.md
  review_output_path: docs/reviews/components/2026-04-18-openclaw-host-bridge-security-baseline.md
  required_artifacts:
    - id: host-bridge-component-view
      path: docs/architecture/components/openclaw-host-bridge/README.md
      review_areas:
        - runtime
      required_in_docs:
        - readme
        - agents
    - id: host-control-domain
      path: docs/architecture/domains/host-control.md
      review_areas:
        - runtime
        - ai
      required_in_docs:
        - readme
        - agents
security_change_record_requirements:
  change_record_readme_path: docs/records/change-records/README.md
  policy_path: docs/records/change-records/policy.yaml
  validator_script_path: scripts/validate_change_record_requirement.py
  workflow_path: .github/workflows/validate-governance-docs.yaml
  pr_template_path: .github/pull_request_template.md
  required_in_docs:
    - readme
    - agents
operator_workflow_requirements:
  workflows:
    - id: supported-host-deployment
      summary: Supported host deployment and verification procedure for the bridge.
      primary_surface_path: docs/host-deployment.md
      required_in_docs:
        - readme
        - agents
