schema_version: 1
repo: workspace-governance
lifecycle: active
required_repo_refs:
  - platform-engineering
  - security-architecture
required_patterns:
  readme:
    - cross-repo governance and routing layer
    - workspace-root
    - workspace audit and sync tooling
  agents:
    - workspace-level control plane
    - new product
    - Treat `openclaw-isolated-deployment/` as retired
forbidden_patterns:
  readme: []
  agents: []
review_control_requirements:
  guidance_files:
    - path: AGENTS.md
      heading: "## Review guidelines"
      required_terms:
        - contract drift
        - workspace-root sync
        - live installed skills
        - improvement candidate
        - validation coverage
  required_github_paths:
    - .github/CODEOWNERS
    - .github/pull_request_template.md
  required_validation_paths:
    - .github/workflows/validate.yaml
  pr_template_path: .github/pull_request_template.md
  required_pr_template_sections:
    - "## Summary"
    - "## Governance Declaration"
    - "## Documentation Updates"
    - "## Validation"
    - "## Codex Review"
    - "## Review Gates"
operator_workflow_requirements:
  workflows:
    - id: codex-github-review-and-control-plane-summary
      summary: Primary operator procedure for workspace-level Codex GitHub review and the read-only control-plane summary.
      primary_surface_path: docs/codex-github-review-and-automation.md
      required_in_docs:
        - readme
        - agents
    - id: delegated-execution-governance
      summary: Primary operator procedure for governed delegated execution, task packets, write-scope ownership, and journal records.
      primary_surface_path: docs/delegated-execution.md
      required_in_docs:
        - readme
        - agents
    - id: self-improvement-escalation
      summary: Primary operator procedure for in-session self-improvement escalation and fail-closed candidate capture.
      primary_surface_path: docs/self-improvement-escalation.md
      required_in_docs:
        - readme
        - agents
    - id: instruction-and-skill-governance
      summary: Primary operator procedure for changing AGENTS files, registered skills, installed skill state, and workspace instruction governance.
      primary_surface_path: docs/instruction-and-skill-governance.md
      required_in_docs:
        - readme
        - agents
