schema_version: 1
repo: platform-engineering
lifecycle: active
required_repo_refs:
  - security-architecture
required_patterns:
  readme:
    - shared platform and release-governance repository
    - products/
    - docs/components/
  agents:
    - workflow maturity
    - products/<product>
forbidden_patterns:
  readme:
    - openclaw-isolated-deployment
  agents: []
review_control_requirements:
  guidance_files:
    - path: AGENTS.md
      heading: "## Review guidelines"
      required_terms:
        - shared-vs-product placement
        - workflow maturity
        - ADR
        - change record
        - security-architecture
    - path: products/openclaw/AGENTS.md
      heading: "## Review guidelines"
      required_terms:
        - stage candidate
        - readiness
        - prod lifecycle
        - post-promotion prod
    - path: products/openproject/AGENTS.md
      heading: "## Review guidelines"
      required_terms:
        - OpenClaw-style
        - platform-integrated
        - backup
        - shared dependency
  required_github_paths:
    - .github/CODEOWNERS
    - .github/pull_request_template.md
  required_validation_paths:
    - .github/workflows/build-and-validate.yaml
    - .github/workflows/security-posture.yaml
  pr_template_path: .github/pull_request_template.md
  required_pr_template_sections:
    - "## Summary"
    - "## Governance Declaration"
    - "## Documentation Updates"
    - "## Validation"
    - "## Codex Review"
    - "## Review Gates"
security_requirements:
  security_owner: security-architecture
  review_checklist_path: docs/reviews/security-review-checklist.md
  review_output_path: docs/reviews/platform/2026-04-18-platform-engineering-security-baseline.md
  required_artifacts:
    - id: platform-trust-boundaries
      path: docs/architecture/platform/trust-boundaries.md
      review_areas:
        - delivery
        - runtime
      required_in_docs:
        - readme
        - agents
    - id: gitops-machine-trust
      path: docs/architecture/domains/gitops-and-machine-trust.md
      review_areas:
        - identity
        - delivery
      required_in_docs:
        - readme
        - agents
    - id: secrets-and-recovery
      path: docs/architecture/domains/secrets-and-recovery.md
      review_areas:
        - secrets
      required_in_docs:
        - readme
        - agents
    - id: ai-security-and-governance
      path: docs/standards/ai-security-and-governance.md
      review_areas:
        - ai
      required_in_docs:
        - readme
        - agents
  delta_review_triggers:
    - id: openproject-runtime-and-automation-boundary
      summary: OpenProject runtime, automation identity, delivery workflow, or production hygiene controls changed.
      review_areas:
        - identity
        - secrets
        - delivery
        - runtime
      path_globs:
        - products/openproject/**
      review_subjects:
        - inventory_section: repos
          name: platform-engineering
        - inventory_section: products
          name: openproject
    - id: openclaw-stage-and-runtime-governance
      summary: OpenClaw stage or production lifecycle, host-bridge lifecycle, or governed runtime controls changed.
      review_areas:
        - identity
        - secrets
        - delivery
        - runtime
        - ai
      path_globs:
        - products/openclaw/**
      review_subjects:
        - inventory_section: repos
          name: platform-engineering
        - inventory_section: products
          name: openclaw
    - id: shared-platform-control-plane-and-secrets
      summary: Shared platform trust, GitOps, secrets, observability, or cluster control-plane surfaces changed.
      review_areas:
        - identity
        - secrets
        - delivery
        - runtime
      path_globs:
        - security/**
        - charts/**
        - observability/**
        - terraform/**
        - docs/architecture/**
        - docs/standards/**
        - scripts/bootstrap_*.sh
        - scripts/migrate_k8s_secret_to_vault.py
      review_subjects:
        - inventory_section: repos
          name: platform-engineering
operator_workflow_requirements:
  workflows:
    - id: dev-integration-profile-usage
      summary: Shared operator procedure for requesting and using dev-integration profiles.
      primary_surface_path: docs/runbooks/dev-integration-profiles.md
      required_in_docs:
        - readme
        - agents
