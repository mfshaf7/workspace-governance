schema_version: 1
failure_classes:
  routing-miss:
    description: Work was routed to the wrong owner, or the correct owner was discovered late.
    recommended_control_types:
      - contract
      - skill
      - doc
  owner-boundary-miss:
    description: Repo or component boundaries were unclear and allowed the wrong layer to absorb a long-lived fix.
    recommended_control_types:
      - contract
      - doc
      - adr
  contract-drift:
    description: Active repos, docs, or build seams no longer told the same architecture truth.
    recommended_control_types:
      - contract
      - validator
      - doc
  rollout-evidence-gap:
    description: The delivery model lacked explicit evidence for build, verification, approval, promotion, or completion.
    recommended_control_types:
      - contract
      - workflow
      - runbook
      - adr
  host-drift-undetected:
    description: Host-owned drift was discovered only during live testing instead of being caught earlier by a preflight or validator.
    recommended_control_types:
      - validator
      - runbook
      - workflow
  unsafe-assumption:
    description: A risky assumption about runtime behavior, trust boundaries, or user flow survived too long before being corrected.
    recommended_control_types:
      - test
      - validator
      - doc
  missing-discussion-gate:
    description: Architecture-shaping work started as implementation before the framing discussion happened.
    recommended_control_types:
      - skill
      - contract
      - doc
  missing-deterministic-test-seam:
    description: A required acceptance or contract check had no supported deterministic seam and depended on improvised manual proof.
    recommended_control_types:
      - validator
      - workflow
      - runbook
  shell-reliability-miss:
    description: Tooling or shell quoting fragility caused avoidable operator friction or execution failure.
    recommended_control_types:
      - skill
      - script
      - doc
  diagnostic-ordering-miss:
    description: Troubleshooting skipped simpler prerequisite or live-truth checks and expanded into deeper analysis, workaround exploration, or redesign too early.
    recommended_control_types:
      - skill
      - workflow
      - runbook
      - validator
      - doc
  workflow-doctrine-gap:
    description: The documented workflow model was missing a real enterprise control or completion rule.
    recommended_control_types:
      - contract
      - adr
      - workflow
      - doc
  self-improvement-runtime-gate-gap:
    description: Self-improvement doctrine existed, but there was no deterministic in-session gate that forced candidate capture before normal work continued.
    recommended_control_types:
      - contract
      - validator
      - workflow
      - skill
      - doc
  learning-closure-regression:
    description: A lesson that was previously treated as closed regressed in active work, showing that the earlier closure controls were too weak or too narrow.
    recommended_control_types:
      - contract
      - validator
      - skill
      - workflow
      - doc
  delegated-scope-control-miss:
    description: Delegated execution happened without a clear packet, explicit ownership split, or proper main-agent authority boundary.
    recommended_control_types:
      - contract
      - validator
      - skill
      - workflow
      - doc
  overlapping-delegated-write-scope:
    description: Two delegated workers were given overlapping write scope, creating avoidable integration or review ambiguity.
    recommended_control_types:
      - contract
      - validator
      - workflow
      - doc
  delegated-live-control-misuse:
    description: Delegated work crossed into ART mutation, live environment mutation, or another main-agent-only control action.
    recommended_control_types:
      - contract
      - validator
      - skill
      - workflow
      - doc
  delegated-untracked-scope:
    description: Delegated workers discovered or implemented meaningful new scope without routing it back through the work system or owner workflow.
    recommended_control_types:
      - contract
      - validator
      - skill
      - workflow
      - doc
