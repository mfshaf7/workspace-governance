schema_version: 1
lane:
  id: dev-integration
  standard_owner: workspace-governance
  runtime_owner: platform-engineering
  delivery_model: local-ungoverned
  runtime_target: local-k3s
  governed_handoff_target: stage
profile_lifecycle:
  statuses:
    - proposed
    - build-admitted
    - active
    - suspended
    - retired
  implementation_statuses:
    - build-admitted
    - active
  self_serve_statuses:
    - active
  request_record_required: true
  build_admission_required_for:
    - build-admitted
  platform_acceptance_required_for:
    - build-admitted
    - active
    - suspended
    - retired
  security_review_ref_required_when_flagged: true
request_admission:
  current_request_adapter:
    system: openproject
    owner_repo: platform-engineering
    target_ref: openproject://projects/workspace-proposals
  required_request_fields:
    - request_record.system
    - request_record.ref
    - requested_by
    - requested_on
    - purpose
  activation_requirements:
    - build-admission-ref
    - owner-runtime-commands-runnable
    - read-only-smoke-passes-when-persistent
    - platform-activation-ref
    - security-review-ref-when-required
  build_admission_requirements:
    - owner-profile-file-exists
    - platform-build-acceptance-ref
    - security-review-ref-when-required
    - implementation-scope-boundary
    - self-serve-launch-denied-until-active
  persistent_request_requirements:
    - runtime.state_model
    - testing.smoke.mutation_mode
    - persistence.justification
    - persistence.retained_data_scope
    - persistence.suspend_resume_semantics
    - persistence.storage_size_or_class
    - persistence.reset_semantics
    - persistence.cutover_plan_when_upgrading
source_state:
  allow_dirty_worktrees: true
  allow_local_only_commits: true
  allow_branch_inputs: true
  allow_worktree_path_overrides: true
  session_manifest_required: true
runtime_state_models:
  - disposable
  - persistent
testing:
  smoke:
    allowed_mutation_modes:
      - read-only
      - mutating
    persistent_profile_rule:
      mutation_mode_must_be: read-only
      mutating_smoke_requires_separate_disposable_profile: true
trigger_guidance:
  required:
    - new-operator-workflow
    - cross-repo-api-iteration
    - canonical-backend-write
    - rapid-operator-ux-iteration
    - new-runtime-control-plane
  recommended:
    - changing-read-help-list-show-shapes
    - evolving-runtime-topology-before-stage
    - cross-repo-contract-rehearsal
  optional:
    - single-repo-pure-logic-change
    - no-external-write-path
runtime_lane_decision:
  required_for_new_repos: true
  decisions:
    - no-runtime
    - local-only
    - dev-integration-required
    - stage-direct
  component_inventory_required_repo_classes:
    - governance-runtime
    - shared-operator-service
    - product-runtime
    - runtime-enforcement
  dev_integration_required_repo_classes:
    - governance-runtime
    - shared-operator-service
  waiver_decisions:
    - local-only
    - no-runtime
    - stage-direct
  waivers: []
forbidden_targets:
  - stage-backend-write
  - prod-backend-write
  - shared-governed-secrets
  - governed-stage-or-prod-evidence
live_miss_escalation:
  owner_repo: workspace-governance
  purpose: >
    Decide whether a failure discovered after local dev-integration proof should
    return to the fast lane, route to the platform/backend boundary, or continue
    in governed rehearsal.
  return_to_dev_integration_when:
    - the workflow shape, operator inputs, or backend write semantics are still changing
    - the failure can be reproduced without governed stage or prod state
    - the active profile owns a faithful disposable or persistent local model for the failing path
  route_to_platform_or_backend_boundary_when:
    - the local workflow proof already passed and the remaining failure is identity, networking, persistence, form writability, or platform projection behavior
    - the failure depends on shared runtime state that the profile deliberately does not own
    - continuing inside the workflow repo would only patch around a platform-owned contract
  governed_rehearsal_allowed_when:
    - reviewed commits and promotion or handoff evidence exist
    - the target lane owns the runtime boundary under test
    - blocker, defect, or risk state is recorded before adjacent mutation continues
  required_record_fields:
    - failed_operation
    - lane_where_seen
    - local_profile_evidence
    - live_boundary_evidence
    - selected_route
    - owner_repo
    - follow_up_record
required_actions:
  - up
  - status
  - smoke
  - down
  - reset
  - promote_check
required_handoff_artifacts:
  - session_manifest
  - promotion_report
  - smoke_summary
required_session_fields:
  - session_id
  - profile_id
  - operator
  - namespace
  - created_at
  - workspace_root
  - owner_repo
  - runtime_owner
  - source_repos
