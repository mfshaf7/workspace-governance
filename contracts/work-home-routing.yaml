schema_version: 1
work_home_routing:
  owner_repo: workspace-governance
  purpose: >
    Classify meaningful workspace work before execution so the work lands in the
    right home without forcing every small repo-local change into the ART.
  applies_to:
    - meaningful source, runtime, platform, workflow, governance, or security work
    - late-discovered work that was already performed but was not classified first
    - plumbing work that changes shared controls, environments, operators, or evidence
  non_goals:
    - replace owner-repo change records
    - force trivial local edits into Workspace Delivery ART
    - let accepted initiative work bypass ART because it is called plumbing
  classification_order:
    - active_incident_or_blocker
    - active_art_slice
    - meaningful_same_initiative_expansion
    - platform_or_workflow_plumbing
    - owner_repo_maintenance
    - new_business_or_architecture_idea
    - late_discovered_unclassified_work
  routing_homes:
    art:
      description: Workspace Delivery ART work item under the accepted initiative.
      system_of_record: Workspace Delivery ART
    owner_repo:
      description: Owner-repo branch, PR, and local evidence without a new ART item.
      system_of_record: owning Git repository
    workspace_proposals:
      description: Workspace Proposals intake before acceptance into delivery.
      system_of_record: Workspace Proposals
    blocker_or_risk:
      description: ART blocker, defect, or risk record before adjacent execution continues.
      system_of_record: Workspace Delivery ART
  classes:
    active_art_slice:
      routing_home: art
      trigger: >
        Work is already inside an accepted ART initiative and materially changes
        the initiative outcome, controls, runtime behavior, or completion evidence.
      required_action: >
        Use the existing ART item when the change is within the same done
        boundary; otherwise create or use the smallest child item with the real
        owner repo, delivery team, Target PI, and iteration.
      proportionality_rule: >
        Do not create a new item for a tiny same-slice correction, but do not
        hide a distinct owner, review, or validation boundary inside another
        item.
    meaningful_same_initiative_expansion:
      routing_home: art
      trigger: >
        A new defect, control gap, or follow-on slice is discovered while
        executing an accepted initiative and it is required for honest
        completion.
      required_action: >
        Add a Defect, User story, or Feature under the active Epic according to
        the real delivery shape before continuing adjacent execution.
      proportionality_rule: >
        Expansion must be explicit when it changes scope, owner, review path,
        or validation evidence; otherwise absorb it into the active item and
        mention it in completion evidence.
    owner_repo_maintenance:
      routing_home: owner_repo
      trigger: >
        Work is repo-local maintenance outside an accepted ART initiative and
        does not change shared platform, operator, security, or workspace
        governance behavior.
      required_action: >
        Use the owner repo's normal branch, PR, validation, and change-record
        discipline when required by that repo.
      proportionality_rule: >
        Do not create ART structure just to track low-risk local maintenance;
        ART is for accepted delivery work, not every commit.
    platform_or_workflow_plumbing:
      routing_home: art
      trigger: >
        Plumbing changes shared runtime, OpenProject/ART adapters, workflow
        surfaces, control-plane behavior, observability, identity, secrets,
        promotion, or operator evidence paths.
      required_action: >
        If tied to an accepted initiative, represent it in ART with the owning
        repo and validation boundary. If not tied to accepted work, route it
        through Workspace Proposals or architecture discussion first.
      proportionality_rule: >
        The word plumbing does not make work invisible. Classify by operational
        impact, owner boundary, and validation burden.
    new_business_or_architecture_idea:
      routing_home: workspace_proposals
      trigger: >
        The work is a new business outcome, architecture direction, product,
        shared component, or major control-plane capability not already accepted
        into ART.
      required_action: >
        Capture and classify through Workspace Proposals before decomposing into
        delivery items.
      proportionality_rule: >
        Do not create execution stories before the idea has an accepted home.
    active_incident_or_blocker:
      routing_home: blocker_or_risk
      trigger: >
        Execution cannot proceed honestly because a live dependency, workflow
        control, environment, or safety concern blocks the current item.
      required_action: >
        Record the blocker on the affected item. Use a Defect for the fix when
        there is a concrete broken control, and a Risk when exposure is broader
        than one item.
      proportionality_rule: >
        Do not keep adjacent mutation going while the current front is blocked;
        record the blocker first, then repair with context. If the next
        required validation, package install, credential, sudo, GUI, approval,
        or account-permission action is outside Codex's safe tool boundary,
        pause the adjacent workflow, state the exact blocked step, and prompt
        the operator immediately instead of substituting weaker CI-only proof
        or a workaround.
    late_discovered_unclassified_work:
      routing_home: art
      trigger: >
        A human or agent already performed meaningful work without applying this
        classification first.
      required_action: >
        Reconcile by classifying the work after discovery, then either attach it
        to the active item evidence, create a compensating ART item, or route it
        to owner-repo maintenance according to the same classes.
      proportionality_rule: >
        Important unclassified work is not discarded, but its late discovery is
        evidence that the classification gate was skipped.
  evidence_relationship:
    art_record: Work-state, scope, blocker, risk, and completion truth.
    owner_repo_change_record: Implementation, runtime, security, or behavior evidence.
    landing_unit: Source review, merge, rollback, and deployment truth.
    review_packet: Evidence bridge from landed or accepted work back to one or more ART items.
    improvement_candidate: Repeated workflow miss or control failure signal.
    handoff: Session continuity when meaningful pending work remains.
  landing_and_review_policy:
    purpose: >
      Keep ART decomposition, Git branching, and completion evidence efficient
      by separating delivery state from source landing and evidence mapping.
    principles:
      - ART items track delivery intent, work state, blockers, risks, and
        completion truth.
      - Landing Units track the smallest source change that should be reviewed,
        merged, deployed, and rolled back together.
      - Review Packets bind landed or explicitly accepted evidence back to one
        or more ART items.
      - ART items, Landing Units, and Review Packets are related but are not
        required to be one-to-one.
      - Branching and merge timing are based on the Landing Unit, not on every
        child story and not automatically on the whole Epic.
    records:
      art_item: Workspace Delivery ART item such as Feature, User story, Defect, Risk, PI Objective, or Epic.
      landing_unit: Branch, PR, direct-land decision, or live-only execution unit that carries one review and rollback boundary.
      review_packet: Evidence record that lists covered ART items, source refs, validation, merge/direct-land/live proof, rollback scope, and exceptions.
    landing_unit_rules:
      - One Landing Unit may cover one ART child, several children, one Feature,
        or a small cohesive Epic when review and rollback boundaries are shared.
      - Do not create a branch solely because a new ART child exists.
      - Do not force a whole Epic into one branch when the Epic spans repos,
        owners, review paths, security boundaries, or rollback scopes.
      - Long-running work may use an early pushed draft PR for backup, CI, and
        review visibility while still merging only when the Landing Unit is
        complete.
      - Source-backed Landing Units must create or refresh a draft Review
        Packet while the PR is still open, using `open_pr` evidence, concrete
        changed-surface explanations, test and validation results, rollback
        boundary, and one completion mapping per covered ART item.
      - Before merge, fetch the PR base and run the local command or command
        set that is CI-equivalent for the changed surface. When required CI
        uses a base-aware validator, the local proof must use the same base-ref
        shape, such as `--against-ref origin/main`, after fetching the base.
        Record the command, base ref, and result in Review Packet validation
        evidence.
      - If CI-equivalent proof cannot run because the next step needs
        operator-side credentials, package installation, sudo, a GUI action,
        approval, or account permission, stop and prompt the operator
        immediately; do not treat GitHub CI as the first proof unless the
        operator explicitly accepts that as a blocker or exception.
      - Run the broker Review Packet readiness gate after the PR is open and
        before merge; a readiness failure blocks merge until the same PR is
        fixed or the Landing Unit is deliberately split.
      - Cross-repo Landing Units must record merge order and final SHA evidence
        for every repo they touch.
      - A Landing Unit is not valid when one covered child must be rolled back
        independently from the others.
    completion_rules:
      - Source-backed ART children remain open until covered by a finalized
        Review Packet with merged PR, approved direct-land, or equivalent
        durable source evidence.
      - Several source-backed ART children may close from the same finalized
        Review Packet.
      - Non-source ART items may close with non-merge evidence, such as live
        verification, risk disposition, planning decision, or ART metadata
        repair proof.
      - Work implemented on a branch but not landed is not terminal done; record
        it as in-progress with work notes such as implemented pending landing.
      - Pre-merge readiness is not final completion evidence. After merge,
        update the Review Packet to `merged_pr`, record the merge commit, then
        finalize it before source-backed ART completion.
      - Completion evidence must state either the Review Packet reference or
        the reason the item is non-source evidence only.
    exception_paths:
      direct_land:
        use_when: >
          The operator explicitly approves direct-to-main landing or the owning
          repo's documented workflow allows it.
        required_evidence:
          - operator approval or repo workflow reference
          - final commit SHA
          - validation evidence
          - rollback or recovery note
      live_only:
        use_when: >
          The work changes live state but no source artifact is expected, such
          as runtime repair, projection sync, or manual operational recovery.
        required_evidence:
          - live command or broker route used
          - before and after state when available
          - reconciliation note if source or ART truth is affected
          - follow-up owner when a durable source fix is still needed
      non_source:
        use_when: >
          The ART item is planning, analysis, risk disposition, review, or
          metadata-only work with no source landing requirement.
        required_evidence:
          - decision or review summary
          - authoritative record reference
          - validation or readback evidence
    defect_handling:
      - After containment of a newly discovered defect, classify it before
        implementation as one of immediate_blocker, deferred_defect,
        absorbed_same_slice_fix, or risk.
      - A discovered defect is an immediate blocker only when safe continuation
        is impossible because active quality remains unhealthy, the next
        mutation would corrupt state, evidence cannot be trusted, the runtime
        path is down, or an open security/trust exposure exists.
      - If containment restores safe continuation, record the defect or follow-up
        and continue the active committed front instead of context-switching
        into an unplanned fix.
      - Unexpected defects stop adjacent closeout when they affect completion
        truth, safety, runtime behavior, security posture, or evidence.
      - A same-cause, same-owner, same-validation defect may be fixed inside
        the current Landing Unit and Review Packet.
      - A defect with a distinct cause, owner, review path, rollback boundary,
        or validation burden gets its own ART Defect and, when source-backed,
        its own or explicitly shared Landing Unit.
      - Defects outside the active Epic but caused by current work must be
        linked and assessed for blocker or risk impact before parent closeout.
    parent_coverage_gate:
      - A Feature or Epic may close only when every child is covered by a
        finalized Review Packet or explicitly marked as non-source evidence
        only.
      - Parent closeout evidence must summarize Review Packet coverage instead
        of duplicating every child item's full merge evidence.
      - Open draft packets, unmerged branches, unresolved direct-land
        exceptions, or live-only follow-ups that affect scope or risk block
        parent closeout.
      - Failed or skipped pre-merge readiness blocks parent closeout because it
        proves the Landing Unit was not checked before merge.
    cleanup_policy:
      - Retire draft PRs, branches, temporary worktrees, and draft Review
        Packets after merge, direct-land acceptance, retirement, or abandonment.
      - Branch lifecycle residue is a control failure when it is not tied to an
        open PR or documented exception.
      - Review Packets should remain as evidence records only when they support
        active completion, audit, rollback, or future troubleshooting.
  reconciliation_policy:
    principles:
      - Preserve important work; do not discard a useful change solely because
        the work-home gate was missed.
      - Do not fabricate history; late reconciliation records when the miss was
        discovered and which evidence proves the actual work.
      - Use the same classification order after discovery that would have been
        used before execution.
      - Reconcile before adjacent planned ART mutation continues when the
        skipped classification affects the active initiative, blocker state,
        risk state, security posture, or completion evidence.
    backfill_scope:
      - Backfill is selective and evidence-driven, not a mass recreation of all
        historical work as ART items.
      - Mandatory backfill covers active initiative work, active blockers or
        risks, source or runtime changes needed for current completion, and
        repeated control misses.
      - Closed historical work is backfilled only when it is needed to explain
        current state, security evidence, auditability, or an active follow-up.
    triggers:
      - A human operator performs important plumbing or runtime repair without
        creating the expected ART, proposal, blocker, risk, or owner-repo
        record first.
      - An agent discovers meaningful work during implementation that is not
        covered by the active item.
      - A merged PR, local branch, live environment change, or generated
        artifact is found without the expected work-state home.
      - A repeated workflow miss shows that the classification gate was skipped.
    resolution_paths:
      attach_to_active_item:
        description: Record the work as part of the current ART item's evidence.
        use_when: >
          The work is genuinely same-slice, shares the same owner and validation
          boundary, and does not change scope, risk, or review ownership.
        required_evidence:
          - active ART item reference
          - change summary
          - commit, PR, live check, or file reference proving the work
          - statement that no separate owner, risk, or validation boundary exists
      create_compensating_art_item:
        description: Create or use a new ART item after discovery.
        use_when: >
          The work has independent scope, owner repo, review path, blocker,
          risk, validation proof, or completion evidence.
        required_evidence:
          - parent initiative or feature reference
          - owner repo and delivery team
          - reason the work was not covered by the active item
          - completion or remaining-work evidence
      route_owner_repo_maintenance:
        description: Keep the work in the owner repo without creating ART noise.
        use_when: >
          The work is outside accepted ART scope and does not affect shared
          workflow, platform, security, or workspace governance behavior.
        required_evidence:
          - owner repo branch or PR reference
          - validation evidence
          - statement that the work is outside accepted initiative scope
      create_workspace_proposal:
        description: Route the discovered work to intake before delivery.
        use_when: >
          The work is a new business outcome, architecture direction, product,
          shared component, or major control-plane capability not yet accepted.
        required_evidence:
          - proposal reference
          - classification rationale
          - operator acceptance or rejection decision when available
      record_improvement_candidate:
        description: Capture the skipped gate as a learning/control miss.
        use_when: >
          The miss is repeated, operator-called-out, machine-visible, or caused
          by a weak workflow control.
        required_evidence:
          - improvement candidate reference
          - signal and failure-class rationale
          - owner and due date for follow-up control
      open_defect_or_risk:
        description: Record active broken-control or exposure state in ART.
        use_when: >
          The discovered work or missed gate blocks execution, exposes broader
          delivery risk, or requires repair before honest completion.
        required_evidence:
          - affected work item reference
          - defect or risk reference
          - blocker or ROAM fields when applicable
    required_decision_record:
      - discovered_on
      - discovered_by
      - actor_or_source_of_change
      - change_summary
      - authoritative_evidence_refs
      - classification_result
      - selected_resolution_path
      - owner_repo
      - art_or_proposal_or_candidate_refs
      - security_or_risk_review_needed
      - operator_acceptance_when_required
    forbidden_outcomes:
      - backdating an ART item or pretending approval existed before it did
      - discarding useful work solely because classification was late
      - hiding accepted initiative work in an owner-repo-only note
      - closing an active item while known unclassified work still affects its
        scope, risk, blocker state, or completion evidence
      - treating urgent human bypass as normal process instead of reconciling it
  examples:
    - scenario: Fix a typo in one owner-repo README outside active initiative work.
      class: owner_repo_maintenance
      owner_repo: workspace-governance
      result: Owner-repo PR only; no ART item unless the typo is part of accepted ART scope.
    - scenario: Repair the platform observability stack.
      class: platform_or_workflow_plumbing
      owner_repo: platform-engineering
      result: ART item if this is accepted initiative work; otherwise Workspace Proposal or architecture discussion before execution.
    - scenario: Broker ART adapter drops Target PI during active #362 execution.
      class: meaningful_same_initiative_expansion
      owner_repo: operator-orchestration-service
      result: Defect child under the active ART Feature with live repair proof.
    - scenario: Human operator makes important plumbing changes without recording the work home.
      class: late_discovered_unclassified_work
      owner_repo: workspace-governance
      result: Reconcile the work into the active item evidence or create a compensating item; do not ignore the work because the rule was missed.
    - scenario: One PR implements three source-backed user stories under the same Feature.
      class: active_art_slice
      owner_repo: operator-orchestration-service
      result: Use one Landing Unit and one finalized Review Packet to close all three stories after merge.
    - scenario: A Risk item is closed after live ART readback proves mitigation state with no source change.
      class: active_art_slice
      owner_repo: workspace-governance
      result: Close with non-source evidence only; do not require or invent merge evidence.
    - scenario: A defect found during implementation has a different rollback boundary from the current branch.
      class: meaningful_same_initiative_expansion
      owner_repo: workspace-governance
      result: Create or use a Defect item and separate Landing Unit instead of hiding it inside the current Review Packet.
