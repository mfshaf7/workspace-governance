schema_version: 1
governance_validator_catalog:
  owner_repo: workspace-governance
  runtime_repo: workspace-governance-control-fabric
  defining_epic_ref: openproject://work_packages/498
  defining_feature_ref: openproject://work_packages/500
  inventory_work_item_ref: openproject://work_packages/501
  primary_surface_path: docs/governance-validator-catalog.md
  purpose: inventory and classify current workspace governance validators, audits, materializers, scaffolding commands, and external operator command surfaces before WGCF starts invoking them
  authority_model:
    catalog_authority: workspace-governance owns validator identity, command posture, safety class, profile eligibility, and retirement posture.
    runtime_consumption_rule: workspace-governance-control-fabric may consume this catalog to plan, invoke, cache, and receipt checks, but must not redefine catalog truth locally.
    art_mutation_boundary: operator-orchestration-service remains the only Delivery ART mutation authority; WGCF may emit recommendations and receipts for OOS.
    retirement_rule: no direct validator or command path may be removed until shadow parity, rollback, and replacement receipt evidence are recorded.
    evidence_rule: compact receipts are operator-facing evidence; raw command output must be captured as artifact references when retained.
  admission_contract:
    work_item_ref: openproject://work_packages/504
    intake_policy_ref: contracts/intake-policy.yaml
    active_repo_inventory_ref: contracts/repos.yaml
    active_product_inventory_ref: contracts/products.yaml
    active_component_inventory_ref: contracts/components.yaml
    runtime_profile_registry_ref: contracts/developer-integration-profiles.yaml
    intake_register_ref: contracts/intake-register.yaml
    rule: new active or in-scope repos, products, components, and runtime profiles must declare WGCF validation behavior before they can become governed workspace surfaces
    required_behavior_fields:
      - posture
      - wgcf_graph_role
      - catalog_refs
      - notes
    denied_without_behavior:
      - active repo inventory entry
      - active product inventory entry
      - active component inventory entry
      - registered runtime profile entry
      - proposed or admitted intake repo
      - proposed or admitted intake product
      - proposed or admitted intake component
  profiles:
    local-read-only:
      description: local checkout validation without live runtime mutation, external writes, or authority mutation
    dev-integration:
      description: local-k3s or broker-backed validation for active dev-integration profiles after platform and security gates allow that specific command
    governed-stage:
      description: governed stage-readiness validation requiring reviewed source, approved runtime profile, and release-gate evidence
    break-glass:
      description: explicit operator-approved diagnostic posture for live incidents; never a default WGCF plan output
  safety_classes:
    local-read-only:
      description: reads local files and emits bounded terminal output only
      may_run_by_default: true
      requires_explicit_operator_gate: false
    workspace-cross-repo-read:
      description: reads sibling repos or generated workspace state under a declared workspace root
      may_run_by_default: true
      requires_explicit_operator_gate: false
    remote-read:
      description: reads remote GitHub, branch, workflow, or other network-backed state
      may_run_by_default: false
      requires_explicit_operator_gate: true
    live-runtime-read:
      description: reads live Kubernetes, broker, or platform runtime state
      may_run_by_default: false
      requires_explicit_operator_gate: true
    materialized-output-write:
      description: writes generated or materialized outputs such as workspace-root files, installed skills, or generated maps
      may_run_by_default: false
      requires_explicit_operator_gate: true
    structured-record-write:
      description: creates or updates governance records, intake records, or scaffolded review artifacts
      may_run_by_default: false
      requires_explicit_operator_gate: true
    authority-mutation:
      description: mutates an upstream authority store and must stay outside WGCF autonomous execution
      may_run_by_default: false
      requires_explicit_operator_gate: true
  command_surfaces:
    - surface_id: workspace-governance-python-scripts
      owner_repo: workspace-governance
      command_family: python3 scripts/<script>.py ...
      current_use: local workspace governance validation, audit, materialization, and record scaffolding
      wgcf_role: primary source of local validator commands after catalog and safety checks are loaded
      safety_class: local-read-only
      mutation_boundary: individual catalog entries declare whether they write materialized output or structured records
    - surface_id: workspace-delivery-art-broker
      owner_repo: operator-orchestration-service
      command_family: npm run art -- <command>
      current_use: canonical Delivery ART read, planning, blocker, completion, projection, and review-packet workflow
      wgcf_role: recommendation target only; WGCF may emit receipt refs or draft payloads for OOS but must not mutate ART directly
      safety_class: live-runtime-read
      mutation_boundary: OOS owns all ART mutations
    - surface_id: oos-api-probe
      owner_repo: operator-orchestration-service
      command_family: npm run api:probe -- <METHOD> <PATH>
      current_use: live broker API probing and contract confirmation
      wgcf_role: live-read or smoke input after dev-integration profile gates are active
      safety_class: live-runtime-read
      mutation_boundary: OOS API decides write permissions; WGCF must not bypass OOS identity and profile gates
    - surface_id: platform-openproject-make
      owner_repo: platform-engineering
      command_family: make openproject-*
      current_use: OpenProject workflow quality checks and compatible-view projection sync
      wgcf_role: external platform-owned validator or reconciler invoked only through approved profiles
      safety_class: live-runtime-read
      mutation_boundary: platform-engineering owns runtime target selection and reconciliation scripts
    - surface_id: platform-devint-runner
      owner_repo: platform-engineering
      command_family: make devint-*
      current_use: shared local-k3s dev-integration lifecycle actions
      wgcf_role: future runtime health and profile evidence source after platform gates
      safety_class: live-runtime-read
      mutation_boundary: platform-engineering owns dev-integration runtime lifecycle
    - surface_id: github-cli
      owner_repo: workspace-governance
      command_family: gh <resource> <action>
      current_use: branch, PR, workflow, and review-control evidence
      wgcf_role: remote-read evidence source when a profile allows GitHub access
      safety_class: remote-read
      mutation_boundary: write operations require explicit operator and repo workflow authority
    - surface_id: k3s-kubectl
      owner_repo: platform-engineering
      command_family: k3s kubectl ...
      current_use: live runtime truth and emergency diagnostic fallback
      wgcf_role: live-read evidence source only after profile gates; not a default ART access path
      safety_class: live-runtime-read
      mutation_boundary: platform-engineering owns runtime access and namespace posture
    - surface_id: wgcf-runtime
      owner_repo: workspace-governance-control-fabric
      command_family: wgcf <command>
      current_use: future compact-by-default validation planning, execution, readiness, receipts, and ledger
      wgcf_role: target runtime surface after catalog ingestion and shadow parity
      safety_class: local-read-only
      mutation_boundary: fabric-local receipts, artifacts, and ledger only
  representative_scopes:
    - scope_id: workspace-governance
      planner_scope: component:workspace-governance
      owner_repo: workspace-governance
      parity_contract_scope_ref: workspace-governance
      purpose: prove WGCF can consume the workspace-owned validator catalog and receipt local workspace validators without duplicating policy truth
    - scope_id: delivery-art
      planner_scope: component:delivery-art
      owner_repo: operator-orchestration-service
      parity_contract_scope_ref: delivery-art
      purpose: prove WGCF can receipt broker read posture while OOS remains the only Delivery ART mutation authority
    - scope_id: platform-runtime
      planner_scope: component:platform-runtime
      owner_repo: platform-engineering
      parity_contract_scope_ref: platform-runtime
      purpose: prove WGCF can receipt platform-owned runtime read gates under an explicit dev-integration profile
    - scope_id: security-review
      planner_scope: component:security-review
      owner_repo: security-architecture
      parity_contract_scope_ref: security-review
      purpose: prove WGCF can cite current security posture without accepting security risk or replacing security-architecture authority
  retirement_register:
    - register_id: workspace-governance-read-validators
      owner_repo: workspace-governance
      entry_refs:
        - repo-structure
        - contract-model
        - delegation-journal
        - intake-model
        - developer-integration
        - cross-repo-truth
        - governance-engine-shadow-parity
        - security-bindings
        - review-coverage
        - security-delta-reviews
        - security-evidence
        - security-change-record-lanes
        - component-contracts
        - workspace-layout
        - stale-content
        - improvement-candidates
        - improvement-signals
        - learning-closure
        - codex-review-controls
        - structured-record
        - touched-records-preflight
      current_posture: direct commands are retained as compatibility entrypoints while WGCF learns to plan and receipt them
      retirement_allowed: true
      retirement_gate: shadow parity must prove WGCF selected the same checks, reported equivalent pass/fail posture, preserved artifact refs, and produced rollback instructions
      rollback_requirement: direct python entrypoints and validation-matrix coverage remain available until the replacement WGCF profile has passed representative repo, ART, platform, and security scopes
    - register_id: workspace-governance-remote-read-audits
      owner_repo: workspace-governance
      entry_refs:
        - branch-lifecycle
        - remote-alignment
        - workspace-control-plane-summary
      current_posture: remote-read audits require explicit profile gating because they may call GitHub or other network-backed sources
      retirement_allowed: true
      retirement_gate: shadow parity must prove WGCF remote-read profile identity, timeout, retry, cache, stale-result behavior, and equivalent direct-command findings before replacing direct commands
      rollback_requirement: direct remote-read commands remain documented and executable for restart-readiness and clean-state claims
    - register_id: materialized-output-writers
      owner_repo: workspace-governance
      entry_refs:
        - sync-workspace-root
        - install-skills
        - materialize-governance-engine-outputs
        - governance-engine-materializer
      current_posture: materializers are authority-adjacent write surfaces and are not default WGCF execution targets
      retirement_allowed: false
      retirement_gate: none; WGCF may recommend or check materialization, but actual write entrypoints stay explicit until a separate approved materializer design exists
      rollback_requirement: current direct materializer commands remain the rollback path
    - register_id: structured-record-writers
      owner_repo: workspace-governance
      entry_refs:
        - scaffold-intake
        - record-improvement-candidate
        - record-after-action
        - check-self-improvement-escalation
      current_posture: record writers create or update governance authority records and must stay recommendation-only for WGCF
      retirement_allowed: false
      retirement_gate: none under this initiative; record mutation remains human or broker-guided until a separate approval runtime is designed
      rollback_requirement: direct scaffolders remain the authoritative controlled write path
    - register_id: delivery-art-broker-surface
      owner_repo: operator-orchestration-service
      entry_refs:
        - delivery-art-broker-read
        - delivery-art-broker-mutation
        - delivery-art-api-probe-read
        - delivery-art-api-probe-mutation
      current_posture: OOS remains the canonical ART read and write surface; WGCF may consume reads and emit recommendations or draft refs
      retirement_allowed: false
      retirement_gate: none; WGCF must never replace OOS as ART mutation authority
      rollback_requirement: OOS broker CLI and API remain the rollback and authority path
    - register_id: platform-owned-runtime-surfaces
      owner_repo: platform-engineering
      entry_refs:
        - openproject-quality-check
        - openproject-projection-sync
        - devint-runner-read
        - devint-runner-lifecycle
        - kubernetes-runtime-read
        - kubernetes-runtime-mutation
      current_posture: platform runtime commands stay platform-owned and profile-gated
      retirement_allowed: false
      retirement_gate: none under workspace-governance; platform-engineering owns any runtime command replacement decision
      rollback_requirement: platform-owned make and k3s command paths remain the rollback path
    - register_id: github-command-surface
      owner_repo: workspace-governance
      entry_refs:
        - github-remote-read
        - github-remote-mutation
      current_posture: GitHub reads may become profile-gated evidence inputs; GitHub writes stay explicit repo workflow actions
      retirement_allowed: false
      retirement_gate: none under this initiative; future GitHub App integration would need its own authority and security review
      rollback_requirement: direct gh commands and GitHub UI remain the rollback path
    - register_id: support-libraries
      owner_repo: workspace-governance
      entry_refs:
        - contracts-lib
      current_posture: support libraries are imported by validators and materializers, not invoked as checks
      retirement_allowed: false
      retirement_gate: none; library extraction or replacement belongs to governance-engine packaging work
      rollback_requirement: direct library imports remain part of the current validators
  entries:
    repo-structure:
      kind: validator
      owner_repo: workspace-governance
      surface_id: workspace-governance-python-scripts
      executable_path: scripts/validate_repo_structure.py
      command: python3 scripts/validate_repo_structure.py --repo-root .
      purpose: validate required workspace-governance files, directories, canonical root notes, and repository origin shape
      scope: repo-local
      safety_class: local-read-only
      allowed_profiles:
        - local-read-only
        - dev-integration
        - governed-stage
      requires_workspace_root: false
      requires_network: false
      mutates_authority: false
      writes_materialized_outputs: false
      included_in_validation_matrix: true
      wgcf_invocation:
        enabled: true
        validation_tier: smoke
        working_directory_repo: workspace-governance
        scopes:
          - component:workspace-governance
          - repo:workspace-governance
          - authority:workspace-clean-state
        timeout_seconds: 120
        output_budget_bytes: 20000
      wgcf_posture: profile-gated-wgcf-invocation
      retirement_posture: keep-direct-until-shadow-parity
    contract-model:
      kind: validator
      owner_repo: workspace-governance
      surface_id: workspace-governance-python-scripts
      executable_path: scripts/validate_contracts.py
      command: python3 scripts/validate_contracts.py --repo-root .
      purpose: validate workspace contracts, schemas, repo rules, semantic relationships, and source references
      scope: repo-local
      safety_class: local-read-only
      allowed_profiles:
        - local-read-only
        - dev-integration
        - governed-stage
      requires_workspace_root: false
      requires_network: false
      mutates_authority: false
      writes_materialized_outputs: false
      included_in_validation_matrix: true
      wgcf_invocation:
        enabled: true
        validation_tier: smoke
        working_directory_repo: workspace-governance
        scopes:
          - component:workspace-governance
          - repo:workspace-governance
        timeout_seconds: 120
        output_budget_bytes: 20000
      wgcf_posture: candidate-for-wgcf-invocation
      retirement_posture: keep-direct-until-shadow-parity
    delegation-journal:
      kind: validator
      owner_repo: workspace-governance
      surface_id: workspace-governance-python-scripts
      executable_path: scripts/validate_delegation_journal.py
      command: python3 scripts/validate_delegation_journal.py --workspace-root /home/mfshaf7/projects
      purpose: validate delegated-execution journal records, task packets, write-scope discipline, and security-review references
      scope: workspace-cross-repo
      safety_class: workspace-cross-repo-read
      allowed_profiles:
