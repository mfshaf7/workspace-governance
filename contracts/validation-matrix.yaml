schema_version: 1
validators:
  repo-structure:
    script: scripts/validate_repo_structure.py
    scope: workspace-governance
  contract-model:
    script: scripts/validate_contracts.py
    scope: workspace-governance
  intake-model:
    script: scripts/validate_intake.py
    scope: local-workspace
    requires_workspace_checkout: true
  developer-integration:
    script: scripts/validate_developer_integration.py
    scope: local-workspace
    requires_workspace_checkout: true
  cross-repo-truth:
    script: scripts/validate_cross_repo_truth.py
    scope: local-workspace
    requires_workspace_checkout: true
    generated_outputs:
      - generated/system-map.yaml
      - generated/resolved-owner-map.json
      - generated/resolved-dependency-graph.json
      - generated/stale-content-rules.json
  security-bindings:
    script: scripts/validate_security_bindings.py
    scope: local-workspace
    requires_workspace_checkout: true
  review-coverage:
    script: scripts/validate_review_coverage.py
    scope: local-workspace
    requires_workspace_checkout: true
  security-evidence:
    script: scripts/validate_security_evidence.py
    scope: local-workspace
    requires_workspace_checkout: true
  security-change-record-lanes:
    script: scripts/validate_security_change_record_lanes.py
    scope: local-workspace
    requires_workspace_checkout: true
  component-contracts:
    script: scripts/validate_component_contracts.py
    scope: local-workspace
    requires_workspace_checkout: true
  workspace-layout:
    script: scripts/audit_workspace_layout.py
    scope: local-workspace
    requires_workspace_checkout: true
  stale-content:
    script: scripts/audit_stale_content.py
    scope: local-workspace
    requires_workspace_checkout: true
  learning-closure:
    script: scripts/validate_learning_closure.py
    scope: local-workspace
    requires_workspace_checkout: true
