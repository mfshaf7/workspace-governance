name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install validation dependencies
        run: pip install -r requirements.txt

      - name: Validate repo structure
        run: python3 scripts/validate_repo_structure.py --repo-root .

      - name: Validate contract model
        run: python3 scripts/validate_contracts.py --repo-root .

      - name: Materialize active and admitted repos
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import subprocess
          import yaml

          repo_root = Path(".").resolve()
          workspace_root = repo_root / ".workspace-ci"
          if workspace_root.exists():
              shutil.rmtree(workspace_root)
          workspace_root.mkdir()
          shutil.copytree(
              repo_root,
              workspace_root / "workspace-governance",
              ignore=shutil.ignore_patterns(".git", ".workspace-ci", ".workspace-skills", "__pycache__", "*.pyc"),
          )

          repos = yaml.safe_load((repo_root / "contracts" / "repos.yaml").read_text())["repos"]
          intake_repos = yaml.safe_load((repo_root / "contracts" / "intake-register.yaml").read_text()).get("repos", {})
          admitted_repos = {
              repo_name
              for repo_name, payload in intake_repos.items()
              if payload.get("status") == "admitted"
          }
          owner_repos = sorted(set(repos.keys()) | admitted_repos)

          for repo_name in owner_repos:
              if repo_name == "workspace-governance":
                  continue
              target = workspace_root / repo_name
              subprocess.run(
                  [
                      "git",
                      "clone",
                      "--depth",
                      "1",
                      f"https://github.com/mfshaf7/{repo_name}.git",
                      str(target),
                  ],
                  check=True,
              )
          PY

      - name: Validate intake model
        run: python3 scripts/validate_intake.py --workspace-root .workspace-ci

      - name: Validate component contracts
        run: python3 scripts/validate_component_contracts.py --workspace-root .workspace-ci --prepare-node-deps

      - name: Validate security bindings
        run: python3 scripts/validate_security_bindings.py --workspace-root .workspace-ci

      - name: Validate review coverage
        run: python3 scripts/validate_review_coverage.py --workspace-root .workspace-ci

      - name: Validate security change-record lanes
        run: python3 scripts/validate_security_change_record_lanes.py --workspace-root .workspace-ci

      - name: Validate Codex review controls
        run: python3 scripts/validate_codex_review_controls.py --workspace-root .workspace-ci

      - name: Validate improvement candidates
        run: python3 scripts/validate_improvement_candidates.py --workspace-root .workspace-ci

      - name: Audit improvement signals
        run: python3 scripts/audit_improvement_signals.py --workspace-root .workspace-ci

      - name: Validate learning closure
        run: python3 scripts/validate_learning_closure.py --workspace-root .workspace-ci

      - name: Install registered skills
        run: python3 scripts/install_skills.py --workspace-root .workspace-ci --target-root .workspace-skills

      - name: Verify installed skills
        run: python3 scripts/install_skills.py --workspace-root .workspace-ci --target-root .workspace-skills --check

      - name: Audit stale content
        run: python3 scripts/audit_stale_content.py --workspace-root . --repo-name workspace-governance

      - name: Compile validation scripts
        run: python3 -m py_compile scripts/audit_workspace_layout.py scripts/audit_stale_content.py scripts/audit_improvement_signals.py scripts/check_remote_alignment.py scripts/contracts_lib.py scripts/install_skills.py scripts/record_after_action.py scripts/record_improvement_candidate.py scripts/scaffold_intake.py scripts/sync_workspace_root.py scripts/validate_codex_review_controls.py scripts/validate_component_contracts.py scripts/validate_contracts.py scripts/validate_cross_repo_truth.py scripts/validate_developer_integration.py scripts/validate_improvement_candidates.py scripts/validate_intake.py scripts/validate_learning_closure.py scripts/validate_repo_structure.py scripts/validate_review_coverage.py scripts/validate_security_bindings.py scripts/validate_security_change_record_lanes.py scripts/workspace_control_plane_summary.py
